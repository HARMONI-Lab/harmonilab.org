        const Hero = () => (
            <header className="relative pt-36 lg:pt-44 pb-24 overflow-hidden">

        const Problem = () => (

                    <div className="grid lg:grid-cols-12 gap-16">
                        <div className="lg:col-span-6">
                            <p className="sec-num mb-3">§ 01 — The Diagnostic Gap</p>
                            <h2 className="font-display font-light text-[clamp(2rem,4.5vw,4rem)] leading-[1.05] tracking-tightest mb-10">
                                Why women <strong className="font-bold text-plum-600">wait longer</strong>.
                            </h2>
                            <p className="dropcap text-[17px] leading-[1.8] text-ink/85 mb-6">
                                Women face on average a <strong className="text-ink">four-year diagnostic delay</strong> compared to men across hundreds of conditions. This "diagnostic shadowing" often occurs when physical symptoms are attributed to mental health issues.
                            </p>
                            <p className="text-[17px] leading-[1.8] text-ink/75 mb-8">
                                This disparity is rooted in cognitive fatigue and a historical lack of female physiological data in medical research. LUCIA addresses this by providing intelligent oversight during clinical encounters.
                            </p>
                            <div className="border-l-2 border-plum-600 pl-6 py-2">
                                <p className="text-[18px] font-bold leading-[1.6] text-ink/80">
                                    "Diagnostic shadowing" — when physical symptoms are incorrectly attributed to psychiatric conditions — disproportionately affects women.
                                </p>
                            </div>
                        </div>
                        <div className="lg:col-span-5 lg:col-start-8 space-y-6 self-center">
                            <div className="border border-rule p-10 bg-cream">
                                <p className="sec-num mb-4">Stat 01</p>
                                <p className="font-display text-6xl text-plum-600 mb-2">4 Years</p>
                                <p className="text-[15px] text-ink/70">Average diagnostic delay for women</p>
                            </div>
                            <div className="border border-rule p-10 bg-cream">
                                <p className="sec-num mb-4">Stat 02</p>
                                <p className="font-display text-6xl text-plum-600 mb-2">700+</p>
                                <p className="text-[15px] text-ink/70">Conditions with gender disparities</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        );

        const Architecture = () => (
            <section id="architecture" className="py-28 lg:py-32 bg-cream border-t border-rule">
                <div className="max-w-[1400px] mx-auto px-6 lg:px-10">
                    <div className="border-b border-rule pb-10 mb-16">
                        <p className="sec-num mb-3">§ 02 — Dual-Stream Architecture</p>
                        <h2 className="font-display font-light text-[clamp(2rem,4.5vw,4rem)] leading-[1.05] tracking-tightest">
                            Separating <strong className="font-bold text-plum-600">listening</strong> from <strong className="font-bold text-plum-600">auditing</strong>.
                        </h2>
                        <p className="text-[16px] leading-[1.7] text-ink/70 max-w-2xl mt-6">
                            LUCIA utilizes Multi-Agent Orchestration to separate the "listening" from the "auditing," preventing the AI from simply confirming existing biases.
                        </p>
                    </div>
                    <div className="grid md:grid-cols-2 gap-px bg-rule border border-rule">
                        <div className="bg-paper p-12">
                            <p className="sec-num mb-4">Agent 01</p>
                            <h4 className="font-display text-3xl text-ink mb-4">The Scribe</h4>
                            <p className="text-[15px] leading-[1.8] text-ink/75">
                                Extracts patient-reported sensations into a structured Review of Systems (ROS), mapping symptoms to physiological clusters with precision and empathy.
                            </p>
                        </div>
                        <div className="bg-paper p-12">
                            <p className="sec-num mb-4">Agent 02</p>
                            <h4 className="font-display text-3xl text-ink mb-4">The Auditor</h4>
                            <p className="text-[15px] leading-[1.8] text-ink/75">
                                Scans the interaction for bias markers and checks findings against the AXIOM Knowledge Base, flagging potential diagnostic oversights.
                            </p>
                        </div>
                    </div>
                </div>
            </section>
        );

        const Demo = () => (
            <section id="demo" className="py-28 lg:py-32 bg-paper border-t border-rule">
                <div className="max-w-[1100px] mx-auto px-6 lg:px-10">
                    <div className="border-b border-rule pb-10 mb-16">
                        <p className="sec-num mb-3">§ 03 — In Action</p>
                        <h2 className="font-display font-light text-[clamp(2rem,4.5vw,4rem)] leading-[1.05] tracking-tightest">
                            The <strong className="font-bold text-plum-600">"Dismissal"</strong> Scenario.
                        </h2>
                        <p className="text-[16px] leading-[1.7] text-ink/70 max-w-2xl mt-6">
                            How LUCIA transforms a frustrating clinical encounter into a powerful advocacy asset.
                        </p>
                    </div>

                    <div className="bg-ink text-paper p-10 lg:p-14">
                        <div>
                            <p className="eyebrow text-plum-300 mb-3">Patient Narrative</p>
                            <div className="border-l-2 border-plum-300 pl-6 py-2">
                                <p className="font-bold text-[20px] leading-[1.6] text-paper/90">
                                    "I've been waking up with stiff, swollen joints… He told me that at 48, this is just 'empty nest syndrome' and told me to try meditation to calm my nerves."
                                </p>
                            </div>
                        </div>

                        <div className="border-t border-paper/15 mt-10 pt-10">
                            <p className="eyebrow text-plum-300 mb-6">LUCIA Intelligence</p>
                            <div className="grid md:grid-cols-2 gap-10">
                                <div>
                                    <p className="font-display text-xl text-plum-300 mb-2">Detected Pattern</p>
                                    <p className="text-[14px] leading-[1.7] text-paper/70">Attribution of physical swelling to 'nerves'.</p>
                                </div>
                                <div>
                                    <p className="font-display text-xl text-plum-300 mb-2">AXIOM Insight</p>
                                    <p className="text-[14px] leading-[1.7] text-paper/70">Gender-bias risk detected in autoimmune symptom interpretation.</p>
                                </div>
                            </div>
                        </div>

                        <div className="border-t border-paper/15 mt-10 pt-10">
                            <p className="eyebrow text-plum-300 mb-4">Actionable Question</p>
                            <p className="font-display text-[20px] leading-[1.6] text-paper bg-plum-900/40 border border-plum-300/30 p-6">
                                "What further evaluations could help understand the inflammatory markers in my joints, beyond perimenopausal changes?"
                            </p>
                        </div>
                    </div>
                </div>
            </section>
        );

        const Future = () => (
            <section id="future" className="py-28 lg:py-32 bg-cream border-t border-rule">
                <div className="max-w-[1400px] mx-auto px-6 lg:px-10">
                    <div className="border-b border-rule pb-10 mb-16">
                        <p className="sec-num mb-3">§ 04 — The Horizon</p>
                        <p className="text-[18px] leading-[1.7] text-ink/75 max-w-2xl">

                        </p>
                    </div>
                    <div className="grid md:grid-cols-3 gap-px bg-rule border border-rule">
                        {[
                            { t:'Vertex AI Ready',     d:'Built on Google Agent Development Kit for immediate clinical deployment.' },
                            { t:'Anonymized Research', d:'Empowering women to donate their narratives to update global medical guidelines.' },
                            { t:'EHR Integration',     d:'Seamless connection with electronic health record systems for real-time support.' },
                        ].map((f,i)=>(
                            <div key={i} className="bg-paper p-10">
                                <p className="sec-num mb-4">{`0${i+1}`}</p>
                                <h4 className="font-display text-2xl text-ink mb-3">{f.t}</h4>
                                <p className="text-[14px] leading-[1.7] text-ink/70">{f.d}</p>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );

        const App = () => (
            <div className="min-h-screen bg-paper text-ink selection:bg-plum-200 selection:text-plum-900">
                <Navigation />
                <Hero />
                <Problem />
                <Architecture />
                <Demo />
                <Future />
                <Footer />
            </div>
        );

        const ContactForm = () => {
            const [formData, setFormData] = useState({ name:'', email:'', message:'' });
            const [errors, setErrors] = useState({});
            const [status, setStatus] = useState('idle');
            const validate = () => {
                const errs = {};
                if (!formData.name.trim()) errs.name = 'Name is required.';
                if (!formData.email.trim()) errs.email = 'Email is required.';
                else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email)) errs.email = 'Enter a valid email.';
                if (!formData.message.trim()) errs.message = 'Message is required.';
                return errs;
            };
            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
                if (errors[name]) setErrors(prev => ({ ...prev, [name]: '' }));
            };
            const handleSubmit = async (e) => {
                e.preventDefault();
                const errs = validate();
                if (Object.keys(errs).length) { setErrors(errs); return; }
                setStatus('sending');
                try {
                    const res = await fetch('https://formspree.io/f/xgoolwyl', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData),
                    });
                    if (res.ok) { setStatus('sent'); setFormData({name:'',email:'',message:''}); }
                    else setStatus('error');
                } catch { setStatus('error'); }
            };
            if (status === 'sent') {
                return (
                    <div className="py-3">
                        <Check className="mb-2 text-plum-300" />
                        <p className="font-display text-lg text-paper">Message sent.</p>
                        <p className="text-paper/50 text-xs mt-1">We'll get back to you soon.</p>
                        <button onClick={()=>setStatus('idle')} className="mt-3 text-xs text-plum-300 underline">Send another</button>
                    </div>
                );
            }
            const inputBase = "w-full px-0 py-2 bg-transparent border-0 border-b border-paper/25 focus:outline-none focus:border-plum-300 text-sm text-paper placeholder-paper/40 transition-colors";
            return (
                <form onSubmit={handleSubmit} className="space-y-5">
                    <div>
                        <input name="name" type="text" value={formData.name} onChange={handleChange} placeholder="Your Name" className={inputBase} />
                        {errors.name && <div className="text-xs text-red-300 mt-1">{errors.name}</div>}
                    </div>
                    <div>
                        <input name="email" type="email" value={formData.email} onChange={handleChange} placeholder="Your Email" className={inputBase} />
                        {errors.email && <div className="text-xs text-red-300 mt-1">{errors.email}</div>}
                    </div>
                    <div>
                        <textarea name="message" rows="3" value={formData.message} onChange={handleChange} placeholder="Your Message" className={`${inputBase} resize-none`}></textarea>
                        {errors.message && <div className="text-xs text-red-300 mt-1">{errors.message}</div>}
                    </div>
                    <input type="text" name="_gotcha" style={{display:'none'}} />
                    <button type="submit" disabled={status==='sending'}
                        className="group inline-flex items-center gap-2 px-5 py-3 bg-paper text-ink rounded-full text-[12px] tracking-wider uppercase hover:bg-plum-200 transition-colors disabled:opacity-50">
                        <Send /> <span>{status==='sending' ? 'Sending...' : 'Send Message'}</span>
                    </button>
                    {status === 'error' && <p className="text-xs text-red-300">Something went wrong. Please try again.</p>}
                </form>
            );
        };

        const Footer = () => (
            <footer id="contact" className="bg-ink text-paper">
                <div className="max-w-[1400px] mx-auto px-6 lg:px-10 pt-24 pb-10">
                    <div className="grid lg:grid-cols-12 gap-12 mb-20">
                        <div className="lg:col-span-5">
                            <div className="flex items-center gap-3 mb-6">
                                <img src="images/brain_logo.png" alt="HARMONI logo" className="w-12 h-12 object-contain rounded-lg" />
                                <span className="font-display text-3xl text-paper">
                                    HARMONI <span className="font-bold text-plum-300 font-light">Lab</span>
                                </span>
                            </div>
                            <p className="text-paper/65 max-w-md text-[15px] leading-relaxed">
                                An AI-driven project exploring the impact of hormonal changes on female brain and behavior.
                            </p>
                            <div className="flex gap-3 mt-8">
                                <a href="https://ga.linkedin.com/company/harmoni-lab" target="_blank" rel="noopener" className="w-10 h-10 rounded-full border border-paper/20 text-paper/70 flex items-center justify-center hover:bg-paper hover:text-ink transition-colors">
                                    <LinkedIn />
                                </a>
                            </div>
                        </div>
                        <div className="lg:col-span-2">
                            <p className="eyebrow text-plum-300 mb-5">Links</p>
                            <ul className="space-y-3 text-[14px] text-paper/70">
                                <li><a href="index.html#about" className="ink-link hover:text-paper">About</a></li>
                                <li><a href="index.html#mission" className="ink-link hover:text-paper">Mission</a></li>
                                <li><a href="index.html#research" className="ink-link hover:text-paper">Research</a></li>
                                <li><a href="index.html#faq" className="ink-link hover:text-paper">FAQ</a></li>
                            </ul>
                            <p className="eyebrow text-plum-300 mt-8 mb-5">Tools</p>
                            <ul className="space-y-3 text-[14px] text-paper/70">
                                <li><a href="selene.html" className="ink-link hover:text-paper">SELENE</a></li>
                                <li><a href="lucia.html" className="ink-link hover:text-paper">LUCIA</a></li>
