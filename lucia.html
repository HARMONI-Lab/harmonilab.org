                {isOpen&&<div className="lg:hidden bg-paper border-t border-rule"><div className="px-6 py-6 space-y-3">{links.map(l=><a key={l.name} href={l.href} onClick={()=>setIsOpen(false)} className="block py-2 font-display text-2xl text-ink">{l.name}</a>)}</div></div>}
            </nav>
        );
    };

    const Hero = () => (
        <header className="relative pt-36 lg:pt-44 pb-24 overflow-hidden">
            <div className="max-w-[1400px] mx-auto px-6 lg:px-10 relative">
                <div className="flex items-center justify-between border-b border-rule pb-4 mb-12">
                    <div className="eyebrow">Project 03 · Clinical Tool</div>
                    <div className="eyebrow hidden md:block">A HARMONI Lab Initiative</div>
                </div>
                <div className="grid lg:grid-cols-12 gap-10 items-end">
                    <div className="lg:col-span-8">
                        <p className="sec-num mb-6">§ Lucia</p>
                        <h1 className="font-display font-light text-[clamp(3rem,9vw,8rem)] leading-[0.9] tracking-tightest text-ink">LUCIA</h1>
                        <p className="font-bold text-plum-600 text-2xl md:text-3xl mt-4">"A bridge, not a wedge."</p>
                    </div>
                    <div className="lg:col-span-4">
                        <a href="axiom.html" className="flex items-center gap-3 mb-6 px-4 py-3 bg-plum-50 border border-plum-200 rounded-sm hover:bg-plum-100 transition-colors w-fit">
                            <span className="mono text-[10px] text-plum-600 tracking-widest uppercase">Powered by</span>
                            <span className="font-display text-lg text-plum-700 font-bold">AXIOM</span>
                            <ArrowRight className="text-plum-500"/>
                        </a>
                        <p className="text-[17px] leading-[1.7] text-ink/70 max-w-md mb-8">
                            Closing the gender diagnostic gap with multi-agent AI. LUCIA's Auditor checks clinical findings against the AXIOM Knowledge Base in real time, flagging patterns that research shows are frequently misattributed in women.
                        </p>
                        <div className="flex flex-wrap gap-3">
                            <a href="#demo" className="inline-flex items-center gap-2 px-5 py-3 rounded-full bg-ink text-paper text-[12px] tracking-wider uppercase hover:bg-plum-700 transition-colors">See Demo <ArrowRight/></a>
                            <a href="axiom.html" className="inline-flex items-center gap-2 px-5 py-3 rounded-full border border-ink/30 text-ink text-[12px] tracking-wider uppercase hover:bg-ink hover:text-paper transition-colors">AXIOM Engine <ArrowRight/></a>

                    </div>
                </div>
            </div>
        </header>

    const Problem = () => (
        <section className="py-28 lg:py-32 bg-paper border-t border-rule">
            <div className="max-w-[1400px] mx-auto px-6 lg:px-10">
                <div className="grid lg:grid-cols-12 gap-16">
                    <div className="lg:col-span-6">
                        <p className="sec-num mb-3">§ 01 · The Diagnostic Gap</p>
                        <h2 className="font-display font-light text-[clamp(2rem,4.5vw,4rem)] leading-[1.05] tracking-tightest mb-10">
                            Why women <strong className="font-bold text-plum-600">wait longer</strong>.
                        </h2>
                        <p className="dropcap text-[17px] leading-[1.8] text-ink/85 mb-6">
                            Women face on average a <strong className="text-ink">four-year diagnostic delay</strong> compared to men across hundreds of conditions. This "diagnostic shadowing" occurs when physical symptoms are attributed to mental health issues, a pattern rooted in cognitive fatigue and historical gaps in female physiological data.
                        </p>
                        <p className="text-[17px] leading-[1.8] text-ink/75 mb-8">
                            LUCIA addresses this with intelligent oversight during clinical encounters, backed by AXIOM's growing graph of documented symptom-condition relationships in women's health.
                        </p>
                        <div className="border-l-2 border-plum-600 pl-6 py-2">
                            <p className="text-[18px] font-bold leading-[1.6] text-ink/80">
                                "Diagnostic shadowing", attributing physical symptoms to psychiatric conditions, disproportionately affects women. AXIOM makes the counter-evidence available in the room.
                            </p>
                        </div>
                    </div>
                    <div className="lg:col-span-5 lg:col-start-8 space-y-6 self-center">
                        <div className="border border-rule p-10 bg-cream">
                            <p className="sec-num mb-4">Stat 01</p>
                            <p className="font-display text-6xl text-plum-600 mb-2">4 Years</p>
                            <p className="text-[15px] text-ink/70">Average diagnostic delay for women</p>
                        </div>
                        <div className="border border-rule p-10 bg-cream">
                            <p className="sec-num mb-4">Stat 02</p>
                            <p className="font-display text-6xl text-plum-600 mb-2">700+</p>
                            <p className="text-[15px] text-ink/70">Conditions with gender disparities in diagnosis</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    );

    const Architecture = () => (
        <section className="py-28 lg:py-32 bg-cream border-t border-rule">
            <div className="max-w-[1400px] mx-auto px-6 lg:px-10">
                <div className="border-b border-rule pb-10 mb-16">
                    <p className="sec-num mb-3">§ 02 · Dual-Stream Architecture</p>
                    <h2 className="font-display font-light text-[clamp(2rem,4.5vw,4rem)] leading-[1.05] tracking-tightest">
                        Separating <strong className="font-bold text-plum-600">listening</strong> from <strong className="font-bold text-plum-600">auditing</strong>.
                    </h2>
                    <p className="text-[16px] leading-[1.7] text-ink/70 max-w-2xl mt-6">
                        LUCIA uses multi-agent orchestration to separate transcription from analysis, preventing the AI from simply confirming existing biases. The Auditor agent queries AXIOM independently of the Scribe.
                    </p>
                </div>
                <div className="grid md:grid-cols-2 gap-px bg-rule border border-rule mb-12">
                    <div className="bg-paper p-12">
                        <p className="sec-num mb-4">Agent 01</p>
                        <h4 className="font-display text-3xl text-ink mb-4">The Scribe</h4>
                        <p className="text-[15px] leading-[1.8] text-ink/75">
                            Extracts patient-reported sensations into a structured Review of Systems (ROS), mapping symptoms to physiological clusters with precision and empathy.
                        </p>
                    </div>
                    <div className="bg-paper p-12">
                        <p className="sec-num mb-4">Agent 02</p>
                        <h4 className="font-display text-3xl text-ink mb-4">The Auditor</h4>
                        <p className="text-[15px] leading-[1.8] text-ink/75 mb-4">
                            Scans the interaction for bias markers, then queries the AXIOM Knowledge Base to check whether the clinical picture matches documented patterns in women's health literature.
                        </p>
                        <a href="axiom.html" className="inline-flex items-center gap-2 text-[12px] tracking-wider uppercase text-plum-600 hover:text-plum-800 transition-colors">
                            About AXIOM <ArrowRight/>
                        </a>
                    </div>
                </div>
                {/* AXIOM role callout */}
                <div className="border border-plum-200 bg-plum-50 p-8 flex flex-col md:flex-row gap-6 items-start md:items-center">
                    <div className="flex-shrink-0">
                        <p className="mono text-[10px] text-plum-600 tracking-widest uppercase mb-1">Evidence layer</p>
                        <p className="font-display text-3xl text-plum-700 font-bold">AXIOM</p>
                    </div>
                    <p className="text-[15px] leading-[1.75] text-plum-900/75 flex-1">
                        When the Auditor flags a potential case of diagnostic shadowing, it doesn't rely on the LLM's training data for context. It queries AXIOM's knowledge graph, checking what the primary literature actually says about the relationship between the reported symptoms and the proposed diagnosis. That evidence, with source citations and confidence scores, becomes the basis for the actionable prompt generated for the patient.
                    </p>
                </div>
            </div>
        </section>
    );

    const Demo = () => (
        <section id="demo" className="py-28 lg:py-32 bg-paper border-t border-rule">
            <div className="max-w-[1100px] mx-auto px-6 lg:px-10">
                <div className="border-b border-rule pb-10 mb-16">
                    <p className="sec-num mb-3">§ 03 · In Action</p>
                    <h2 className="font-display font-light text-[clamp(2rem,4.5vw,4rem)] leading-[1.05] tracking-tightest">
                        The <strong className="font-bold text-plum-600">"Dismissal"</strong> Scenario.
                    </h2>
                    <p className="text-[16px] leading-[1.7] text-ink/70 max-w-2xl mt-6">
                        How LUCIA transforms a frustrating clinical encounter into a powerful advocacy asset, grounded in AXIOM's evidence base.
                    </p>
                </div>
                <div className="bg-ink text-paper p-10 lg:p-14">
                    <div>
                        <p className="eyebrow text-plum-300 mb-3">Patient Narrative</p>
                        <div className="border-l-2 border-plum-300 pl-6 py-2">
                            <p className="font-bold text-[20px] leading-[1.6] text-paper/90">
                                "I've been waking up with stiff, swollen joints… He told me that at 48, this is just 'empty nest syndrome' and told me to try meditation to calm my nerves."
                            </p>
                        </div>
                    </div>
                    <div className="border-t border-paper/15 mt-10 pt-10">
                        <p className="eyebrow text-plum-300 mb-6">LUCIA Intelligence · via AXIOM</p>
                        <div className="grid md:grid-cols-3 gap-10">
                            <div>
                                <p className="font-display text-xl text-plum-300 mb-2">Detected Pattern</p>
                                <p className="text-[14px] leading-[1.7] text-paper/70">Attribution of physical swelling to 'nerves.' Premature closure. Anchoring bias on psychosocial framing.</p>
                            </div>
                            <div>
                                <p className="font-display text-xl text-plum-300 mb-2">AXIOM Knowledge Graph</p>
                                <p className="text-[14px] leading-[1.7] text-paper/70">Joint pain and swelling documented in perimenopause literature. Autoimmune conditions, rheumatoid arthritis and lupus, show female-predominant onset in this age window. Gender-bias risk flagged.</p>
                            </div>
                            <div>
                                <p className="font-display text-xl text-plum-300 mb-2">Evidence Confidence</p>
                                <p className="text-[14px] leading-[1.7] text-paper/70">Retrieved from 3 RCTs and 1 systematic review. Study-type boost: 1.25×. Retraction status: clear.</p>
                            </div>
                        </div>
                    </div>
                    <div className="border-t border-paper/15 mt-10 pt-10">
                        <p className="eyebrow text-plum-300 mb-4">Actionable Question (generated for patient)</p>
                        <p className="font-display text-[20px] leading-[1.6] text-paper bg-plum-900/40 border border-plum-300/30 p-6">
                            "What further evaluations could help understand the inflammatory markers in my joints, beyond perimenopausal changes?"
                        </p>
                    </div>
                </div>
            </div>
        </section>
    );

    const Future = () => (
        <section className="py-28 lg:py-32 bg-cream border-t border-rule">
            <div className="max-w-[1400px] mx-auto px-6 lg:px-10">
                <div className="border-b border-rule pb-10 mb-16">
                    <p className="sec-num mb-3">§ 04 · The Horizon</p>
                    <p className="text-[18px] leading-[1.7] text-ink/75 max-w-2xl">
                        LUCIA is building toward longitudinal clinical equity. It is transforming how women's health narratives are documented, heard, and acted upon.
                    </p>
                </div>
                <div className="grid md:grid-cols-3 gap-px bg-rule border border-rule">
                    {[
                        {t:'Vertex AI Ready',      d:'Built on Google Agent Development Kit for immediate clinical deployment at scale.'},
                        {t:'Anonymized Research',  d:'Empowering women to donate their narratives to update global medical guidelines via AXIOM\'s graph.'},
                        {t:'EHR Integration',      d:'Seamless connection with electronic health records, with AXIOM providing the evidence substrate for every flag.'},
                    ].map((f,i)=>(
                        <div key={i} className="bg-paper p-10">
                            <p className="sec-num mb-4">{`0${i+1}`}</p>
                            <h4 className="font-display text-2xl text-ink mb-3">{f.t}</h4>
                            <p className="text-[14px] leading-[1.7] text-ink/70">{f.d}</p>
                        </div>
                    ))}
                </div>
            </div>
        </section>
    );

    const ContactForm = () => {
        const [d,setD]=useState({name:'',email:'',message:''});
        const [e,setE]=useState({});
        const [s,setS]=useState('idle');
        const validate=()=>{const er={};if(!d.name.trim())er.name='Required.';if(!d.email.trim())er.email='Required.';else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(d.email))er.email='Invalid.';if(!d.message.trim())er.message='Required.';return er;};
        const onChange=ev=>{const{name,value}=ev.target;setD(p=>({...p,[name]:value}));if(e[name])setE(p=>({...p,[name]:''}));};
        const onSubmit=async ev=>{ev.preventDefault();const er=validate();if(Object.keys(er).length){setE(er);return;}setS('sending');try{const r=await fetch('https://formspree.io/f/xgoolwyl',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});if(r.ok){setS('sent');setD({name:'',email:'',message:''});}else setS('error');}catch{setS('error');}};
        if(s==='sent')return(<div className="py-3"><Check className="mb-2 text-plum-300"/><p className="font-display text-lg text-paper">Message sent.</p><button onClick={()=>setS('idle')} className="mt-3 text-xs text-plum-300 underline">Send another</button></div>);
        const ib="w-full px-0 py-2 bg-transparent border-0 border-b border-paper/25 focus:outline-none focus:border-plum-300 text-sm text-paper placeholder-paper/40 transition-colors";
        return(<form onSubmit={onSubmit} className="space-y-5"><div><input name="name" type="text" value={d.name} onChange={onChange} placeholder="Your Name" className={ib}/>{e.name&&<div className="text-xs text-red-300 mt-1">{e.name}</div>}</div><div><input name="email" type="email" value={d.email} onChange={onChange} placeholder="Your Email" className={ib}/>{e.email&&<div className="text-xs text-red-300 mt-1">{e.email}</div>}</div><div><textarea name="message" rows="3" value={d.message} onChange={onChange} placeholder="Your Message" className={`${ib} resize-none`}/>{e.message&&<div className="text-xs text-red-300 mt-1">{e.message}</div>}</div><input type="text" name="_gotcha" style={{display:'none'}}/><button type="submit" disabled={s==='sending'} className="inline-flex items-center gap-2 px-5 py-3 bg-paper text-ink rounded-full text-[12px] tracking-wider uppercase hover:bg-plum-200 transition-colors disabled:opacity-50"><Send/><span>{s==='sending'?'Sending...':'Send'}</span></button>{s==='error'&&<p className="text-xs text-red-300">Something went wrong.</p>}</form>);
    };

    const Footer = () => (
        <footer id="contact" className="bg-ink text-paper">
            <div className="max-w-[1400px] mx-auto px-6 lg:px-10 pt-24 pb-10">
                <div className="grid lg:grid-cols-12 gap-12 mb-20">
                    <div className="lg:col-span-5">
                        <div className="flex items-center gap-3 mb-6"><img src="images/brain_logo.png" alt="HARMONI logo" className="w-12 h-12 object-contain rounded-lg"/><span className="font-display text-3xl text-paper">HARMONI <span className="font-bold text-plum-300">Lab</span></span></div>
                        <p className="text-paper/65 max-w-md text-[15px] leading-relaxed">An independent AI research lab. AXIOM is our open-source flagship evidence engine.</p>
                        <div className="flex gap-3 mt-8"><a href="https://ga.linkedin.com/company/harmoni-lab" target="_blank" rel="noopener" className="w-10 h-10 rounded-full border border-paper/20 text-paper/70 flex items-center justify-center hover:bg-paper hover:text-ink transition-colors"><LinkedIn/></a></div>
                    </div>
                    <div className="lg:col-span-2">
                        <p className="eyebrow text-plum-300 mb-5">Links</p>
                        <ul className="space-y-3 text-[14px] text-paper/70">
                            <li><a href="index.html#about" className="ink-link hover:text-paper">About</a></li>
                            <li><a href="index.html#mission" className="ink-link hover:text-paper">Mission</a></li>
                            <li><a href="index.html#research" className="ink-link hover:text-paper">Research</a></li>
                        </ul>
                        <p className="eyebrow text-plum-300 mt-8 mb-5">Tools</p>
                        <ul className="space-y-3 text-[14px] text-paper/70">
                            <li><a href="axiom.html" className="ink-link hover:text-paper text-plum-300 font-medium">AXIOM ↗</a></li>
                            <li><a href="selene.html" className="ink-link hover:text-paper">SELENE</a></li>
                            <li><a href="lucia.html" className="ink-link hover:text-paper">LUCIA</a></li>
                            <li><a href="clara.html" className="ink-link hover:text-paper">CLARA</a></li>
                        </ul>
                    </div>
