    const AxiomBridge = () => (

            <div className="max-w-[1400px] mx-auto px-6 lg:px-10">

    const ContactForm = () => {
        const [d,setD]=useState({name:'',email:'',message:''});
        const [e,setE]=useState({});
        const [s,setS]=useState('idle');
        const validate=()=>{const er={};if(!d.name.trim())er.name='Required.';if(!d.email.trim())er.email='Required.';else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(d.email))er.email='Invalid email.';if(!d.message.trim())er.message='Required.';return er;};
        const onChange=ev=>{const{name,value}=ev.target;setD(p=>({...p,[name]:value}));if(e[name])setE(p=>({...p,[name]:''}));};
        const onSubmit=async ev=>{ev.preventDefault();const er=validate();if(Object.keys(er).length){setE(er);return;}setS('sending');try{const r=await fetch('https://formspree.io/f/xgoolwyl',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});if(r.ok){setS('sent');setD({name:'',email:'',message:''});}else setS('error');}catch{setS('error');}};
        if(s==='sent')return(<div className="py-3"><Check className="mb-2 text-plum-300"/><p className="font-display text-lg text-paper">Message sent.</p><button onClick={()=>setS('idle')} className="mt-3 text-xs text-plum-300 underline">Send another</button></div>);
        const ib="w-full px-0 py-2 bg-transparent border-0 border-b border-paper/25 focus:outline-none focus:border-plum-300 text-sm text-paper placeholder-paper/40 transition-colors";
        return(<form onSubmit={onSubmit} className="space-y-5"><div><input name="name" type="text" value={d.name} onChange={onChange} placeholder="Your Name" className={ib}/>{e.name&&<div className="text-xs text-red-300 mt-1">{e.name}</div>}</div><div><input name="email" type="email" value={d.email} onChange={onChange} placeholder="Your Email" className={ib}/>{e.email&&<div className="text-xs text-red-300 mt-1">{e.email}</div>}</div><div><textarea name="message" rows="3" value={d.message} onChange={onChange} placeholder="Your Message" className={`${ib} resize-none`}/>{e.message&&<div className="text-xs text-red-300 mt-1">{e.message}</div>}</div><input type="text" name="_gotcha" style={{display:'none'}}/><button type="submit" disabled={s==='sending'} className="inline-flex items-center gap-2 px-5 py-3 bg-paper text-ink rounded-full text-[12px] tracking-wider uppercase hover:bg-plum-200 transition-colors disabled:opacity-50"><Send/><span>{s==='sending'?'Sending...':'Send'}</span></button>{s==='error'&&<p className="text-xs text-red-300">Something went wrong.</p>}</form>);
    };

    const Footer = () => (
        <footer id="contact" className="bg-ink text-paper">
            <div className="max-w-[1400px] mx-auto px-6 lg:px-10 pt-24 pb-10">
                <div className="grid lg:grid-cols-12 gap-12 mb-20">
                    <div className="lg:col-span-5">
                        <div className="flex items-center gap-3 mb-6"><img src="images/brain_logo.png" alt="HARMONI logo" className="w-12 h-12 object-contain rounded-lg"/><span className="font-display text-3xl text-paper">HARMONI <span className="font-bold text-plum-300">Lab</span></span></div>
                        <p className="text-paper/65 max-w-md text-[15px] leading-relaxed">An independent AI research lab exploring hormonal influences on the female brain. AXIOM is our open-source flagship.</p>
                        <div className="flex gap-3 mt-8"><a href="https://ga.linkedin.com/company/harmoni-lab" target="_blank" rel="noopener" className="w-10 h-10 rounded-full border border-paper/20 text-paper/70 flex items-center justify-center hover:bg-paper hover:text-ink transition-colors"><LinkedIn/></a></div>
                    </div>
                    <div className="lg:col-span-2">
                        <p className="eyebrow text-plum-300 mb-5">Links</p>
                        <ul className="space-y-3 text-[14px] text-paper/70">
                            <li><a href="index.html#about" className="ink-link hover:text-paper">About</a></li>
                            <li><a href="index.html#mission" className="ink-link hover:text-paper">Mission</a></li>
                            <li><a href="index.html#research" className="ink-link hover:text-paper">Research</a></li>
                        </ul>
                        <p className="eyebrow text-plum-300 mt-8 mb-5">Tools</p>
                        <ul className="space-y-3 text-[14px] text-paper/70">
                            <li><a href="axiom.html" className="ink-link hover:text-paper text-plum-300 font-medium">AXIOM ↗</a></li>
                            <li><a href="selene.html" className="ink-link hover:text-paper">SELENE</a></li>
                            <li><a href="lucia.html" className="ink-link hover:text-paper">LUCIA</a></li>
                            <li><a href="clara.html" className="ink-link hover:text-paper">CLARA</a></li>
                        </ul>
                    </div>
                    <div className="lg:col-span-5"><p className="eyebrow text-plum-300 mb-5">Contact</p><ContactForm/></div>
                </div>
                <div className="border-t border-paper/15 mt-10 pt-8 flex flex-col md:flex-row justify-between items-center text-[12px] text-paper/45 tracking-wide">
                    <p>&copy; {new Date().getFullYear()} HARMONI Lab LLC. All rights reserved.</p>
                    <p className="mt-2 md:mt-0">Built with transparency and care for women's health.</p>
                </div>
            </div>
        </footer>
    );

    const App = () => (
        <div className="min-h-screen bg-paper text-ink selection:bg-plum-200 selection:text-plum-900">
            <Navigation/><Hero/><Mission/><Features/><Approach/><Screenshots/><AxiomBridge/><Impact/><Footer/>
        </div>
    );
    createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
