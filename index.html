                                HARMONI <span className="font-bold text-plum-600">Lab</span> LLC
                            </h2>
                            <p className="text-[17px] leading-[1.75] text-ink/80 mb-5">
                                HARMONI Lab LLC <span className="font-medium text-ink">Hormonal And Reproductive Modulation Of Neurocognition Initiative</span> is an independent AI research lab incorporated in Georgia in 2026. We build computational tools to decode hormonal influences on the female brain, with a focus on the menopausal transition as a cerebrovascular inflection point.
                            </p>
                            <p className="text-[16px] leading-[1.75] text-ink/70 mb-5">
                                Our core thesis: hormonal trajectory, not just hormone levels, shapes cognitive aging and stroke risk in women. We are building a multimodal AI framework, combining biosignals, longitudinal symptom data, and neuroimaging, to make this risk computationally visible.
                            </p>
                            <p className="text-[16px] leading-[1.75] text-ink/70 mb-10">
                                HARMONI Lab's planned commercial model includes API access for clinical and research institutions and a direct-to-consumer subscription for longitudinal symptom tracking, currently in development.
                            </p>
                            <div className="grid grid-cols-2 gap-px bg-rule border border-rule">
                                {[
                                    { label: "Founded", value: "2026" },
                                    { label: "Location", value: "Atlanta, Georgia" },
                                ].map((item, i) => (
                                    <div key={i} className="bg-paper p-6">
                                        <p className="eyebrow mb-2">{item.label}</p>
                                        <p className="font-display text-2xl text-ink">{item.value}</p>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="lg:col-span-5">
                            <div className="mb-6 overflow-hidden rounded-lg">
                                <img src="images/demo.png" alt="SELENE in use" className="w-full object-cover rounded-lg" />
                            </div>
                            <div className="border border-rule p-8 bg-cream/40">
                                <p className="eyebrow mb-5">Founder &amp; Principal Investigator</p>
                                <div className="flex items-center gap-4 mb-6">
                                    <div className="w-24 h-24 rounded-full overflow-hidden bg-ink text-paper flex items-center justify-center font-display text-lg">
                                        <img src="images/profile.jpg" alt="Inna Campo, Ph.D." className="w-full h-full object-cover" />
                                    </div>
                                    <div>
                                        <p className="font-display text-2xl text-ink leading-tight">Inna Campo, Ph.D.</p>
                                        <p className="text-[12px] tracking-wide uppercase text-plum-600 mt-1">Founder &amp; Principal Investigator</p>
                                    </div>
                                </div>
                                <p className="text-[14px] leading-[1.75] text-ink/75 mb-3">
                                    AI/ML Researcher with a career spanning outbreak detection at the CDC (recipient of the Charles C. Shepard Science Award), large-scale bioinformatics, and production ML at IBM. Holds a Ph.D. in Computer Science, three granted US patents.
                                </p>
                                <p className="text-[14px] leading-[1.75] text-ink/75 mb-6">
                                    At HARMONI Lab, her work focuses on building privacy-first AI tools for women's health and developing the computational phenotype of cerebrovascular risk during menopause, a problem she describes as "waiting for the technology to catch up."
                                </p>
                                <div className="flex flex-wrap gap-2">
                                    {["Computational Biology", "HPC & Parallel Algorithms", "NGS & Outbreak Detection", "Production ML", "Women's Neurocognition"].map((tag, i) => (
                                        <span key={i} className="px-3 py-1 border border-plum-200 bg-plum-50 text-plum-700 text-[11px] tracking-wide rounded-full">{tag}</span>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        );

        // ---------- Team / Open collaboration ----------
        const Team = () => (
            <section id="team" className="py-24 lg:py-32 bg-cream/50 border-y border-rule">
                <div className="max-w-3xl mx-auto px-6 lg:px-10 text-center">
                    <span className="sec-num">§ 05</span>
                    <h2 className="font-display font-light text-[clamp(2rem,4.5vw,3.75rem)] leading-tight tracking-tightest text-ink mt-6 mb-6">
                        Open <span className="font-bold text-plum-600">Collaboration</span>
                    </h2>
                    <p className="text-[17px] leading-[1.8] text-ink/70">
                        HARMONI Lab is a founder-led research movement advancing women’s health through open science. HARMONI Lab aims to become a collaborative research platform connecting scientists, engineers, and volunteers around shared challenges in innovation and discovery.
                    </p>
                </div>
            </section>
        );

        // ---------- FAQ ----------
        const FAQ = () => {
            const faqs = [
                { q: "How does HARMONI Lab protect my data?", a: "All our tools prioritize privacy-first design. SELENE runs entirely on your device with no data transmitted to external servers. LUCIA and CLARA process only anonymized, aggregated insights for research purposes with explicit consent." },
                { q: "Are the AI recommendations medically validated?", a: "Our AI systems are designed as supportive tools, not replacements for medical advice. All outputs are grounded in peer-reviewed research and clinical guidelines, with transparent source citations for every recommendation." },
                { q: "Can clinicians integrate these tools into their practice?", a: "Yes! CLARA and LUCIA are designed for clinical workflows. We offer API access and integration support for healthcare institutions. Contact us to learn about our pilot program for clinics." },
                { q: "How can I contribute to the research?", a: "We welcome contributions! You can participate through beta testing our tools, sharing anonymized health narratives for research, contributing code, or collaborating on academic publications. Join our early access program to get started." }
            ];
            return (
                <section id="faq" className="py-28 lg:py-36">
                    <div className="max-w-[1400px] mx-auto px-6 lg:px-10">
                        <div className="grid lg:grid-cols-12 gap-12">
                            <div className="lg:col-span-4">
                                <div className="flex items-center gap-4 mb-6">
                                    <span className="sec-num">§ 06</span>
                                    <span className="eyebrow">FAQ</span>
                                </div>
                                <h2 className="font-display font-light text-[clamp(2rem,4.5vw,3.75rem)] leading-[1.02] tracking-tightest text-ink">
                                    Frequently <br/><span className="font-bold text-plum-600">Asked.</span>
                                </h2>
                            </div>
                            <div className="lg:col-span-8">
                                <div className="border-t border-ink/15">
                                    {faqs.map((f, i) => (
                                        <details key={i} className="group border-b border-ink/15 py-6">
                                            <summary className="flex items-start justify-between gap-6">
                                                <div className="flex items-baseline gap-5">
                                                    <span className="sec-num">{String(i+1).padStart(2,'0')}</span>
                                                    <span className="font-display text-xl lg:text-2xl text-ink leading-snug">{f.q}</span>
                                                </div>
                                                <span className="mt-2 text-ink/60 group-open:rotate-45 transition-transform"><Plus /></span>
                                            </summary>
                                            <div className="pl-12 pr-12 mt-4 text-[15px] leading-[1.75] text-ink/70 max-w-2xl">{f.a}</div>
                                        </details>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // ---------- Newsletter ----------
        const Newsletter = () => {
            const [email, setEmail] = useState('');
            const [status, setStatus] = useState('idle');
            const [error, setError] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setError('Enter a valid email address.'); return; }
                setStatus('sending');
                try {
                    const res = await fetch('https://formspree.io/f/xgoolwyl', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email }),
                    });
                    if (res.ok) { setStatus('sent'); setEmail(''); }
                    else { setStatus('error'); setError('Submission failed. Please try again later.'); }
                } catch { setStatus('error'); setError('Network error. Please try again.'); }
            };

            return (
                <section id="newsletter" className="py-28 lg:py-32 bg-ink text-paper relative overflow-hidden">
                    <div className="absolute -top-32 left-1/2 -translate-x-1/2 w-[40rem] h-[40rem] glow opacity-50 pointer-events-none"></div>
                    <div className="max-w-3xl mx-auto px-6 lg:px-10 text-center relative">
                        <span className="sec-num text-plum-300">§ 07 — Stay Updated</span>
                        <h2 className="font-display font-light text-[clamp(2rem,5vw,4rem)] leading-[1.05] tracking-tightest mt-6 mb-6">
                            Join Our <span className="font-bold text-plum-300">Early Access</span> Program
                        </h2>
                        <p className="text-[16px] leading-[1.7] text-paper/70 max-w-xl mx-auto mb-10">
                            Be the first to test new features, access research updates, and shape the future of AI-driven women's health tools.
                        </p>

                        {status !== 'sent' ? (
                            <form onSubmit={handleSubmit} className="flex flex-col sm:flex-row gap-3 max-w-lg mx-auto">
                                <input
                                    type="email" value={email} onChange={(e)=>setEmail(e.target.value)} required
                                    placeholder="Enter your email"
                                    className="flex-1 px-5 py-4 bg-transparent border border-paper/30 rounded-full text-paper placeholder-paper/40 focus:outline-none focus:border-plum-300 text-[14px]"
                                    disabled={status==='sending'}
                                />
                                <button type="submit" disabled={status==='sending'}
                                    className="px-7 py-4 bg-paper text-ink font-medium rounded-full text-[13px] tracking-wide uppercase hover:bg-plum-200 transition-colors disabled:opacity-50">
                                    {status === 'sending' ? 'Sending...' : 'Join Waitlist'}
                                </button>
                            </form>
                        ) : (
                            <div className="border border-paper/20 rounded-sm p-8 max-w-md mx-auto">
                                <Check className="mx-auto mb-3 text-plum-300" />
                                <p className="font-display text-2xl">You're on the list.</p>
                                <p className="text-paper/60 text-sm mt-1">We'll be in touch with updates soon.</p>
                            </div>
                        )}
                        {error && <p className="text-sm text-amber-200 mt-4">{error}</p>}
                        <p className="text-xs text-paper/40 mt-5 tracking-wide">No spam, ever. Unsubscribe anytime.</p>
                    </div>
                </section>
            );
        };

        // ---------- Contact form (footer) ----------
        const ContactForm = () => {
            const [formData, setFormData] = useState({ name:'', email:'', message:'' });
            const [errors, setErrors] = useState({});
            const [status, setStatus] = useState('idle');

            const validate = () => {
                const errs = {};
                if (!formData.name.trim()) errs.name = 'Name is required.';
                if (!formData.email.trim()) errs.email = 'Email is required.';
                else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email)) errs.email = 'Enter a valid email.';
                if (!formData.message.trim()) errs.message = 'Message is required.';
                return errs;
            };
            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
                if (errors[name]) setErrors(prev => ({ ...prev, [name]: '' }));
            };
            const handleSubmit = async (e) => {
                e.preventDefault();
                const errs = validate();
                if (Object.keys(errs).length) { setErrors(errs); return; }
                setStatus('sending');
                try {
                    const res = await fetch('https://formspree.io/f/xgoolwyl', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData),
                    });
                    if (res.ok) { setStatus('sent'); setFormData({name:'',email:'',message:''}); }
                    else setStatus('error');
                } catch { setStatus('error'); }
            };

            if (status === 'sent') {
                return (
                    <div className="py-3">
                        <Check className="mb-2 text-plum-300" />
                        <p className="font-display text-lg text-paper">Message sent.</p>
                        <p className="text-paper/50 text-xs mt-1">We'll get back to you soon.</p>
                        <button onClick={()=>setStatus('idle')} className="mt-3 text-xs text-plum-300 underline">Send another</button>
                    </div>
                );
            }

            const inputBase = "w-full px-0 py-2 bg-transparent border-0 border-b border-paper/25 focus:outline-none focus:border-plum-300 text-sm text-paper placeholder-paper/40 transition-colors";
            return (
                <form onSubmit={handleSubmit} className="space-y-5">
                    <div>
                        <input name="name" type="text" value={formData.name} onChange={handleChange} placeholder="Your Name" className={inputBase} />
                        {errors.name && <div className="text-xs text-red-300 mt-1">{errors.name}</div>}
                    </div>
                    <div>
                        <input name="email" type="email" value={formData.email} onChange={handleChange} placeholder="Your Email" className={inputBase} />
                        {errors.email && <div className="text-xs text-red-300 mt-1">{errors.email}</div>}
                    </div>
                    <div>
                        <textarea name="message" rows="3" value={formData.message} onChange={handleChange} placeholder="Your Message" className={`${inputBase} resize-none`}></textarea>
                        {errors.message && <div className="text-xs text-red-300 mt-1">{errors.message}</div>}
                    </div>
                    <input type="text" name="_gotcha" style={{display:'none'}} />
                    <button type="submit" disabled={status==='sending'}
                        className="group inline-flex items-center gap-2 px-5 py-3 bg-paper text-ink rounded-full text-[12px] tracking-wider uppercase hover:bg-plum-200 transition-colors disabled:opacity-50">
                        <Send /> <span>{status==='sending' ? 'Sending...' : 'Send Message'}</span>
                    </button>
                    {status === 'error' && <p className="text-xs text-red-300">Something went wrong. Please try again.</p>}
                </form>
            );
        };

        // ---------- Footer ----------
        const Footer = () => (
            <footer id="contact" className="bg-ink text-paper">
                <div className="max-w-[1400px] mx-auto px-6 lg:px-10 pt-24 pb-10">
                    <div className="grid lg:grid-cols-12 gap-12 mb-20">
                        <div className="lg:col-span-5">
                            <div className="flex items-center gap-3 mb-6">
                                <img src="images/brain_logo.png" alt="HARMONI logo" className="w-12 h-12 object-contain rounded-lg" />
                                <span className="font-display text-3xl text-paper">
                                    HARMONI <span className="font-bold text-plum-300">Lab</span>
                                </span>
                            </div>
                            <p className="text-paper/65 max-w-md text-[15px] leading-relaxed">
                                An independent AI-native research lab exploring the impact of hormonal changes on female brain and behavior.
                            </p>
                            <div className="flex gap-3 mt-8">
                                <a href="https://ga.linkedin.com/company/harmoni-lab" target="_blank" rel="noopener" className="w-10 h-10 rounded-full border border-paper/20 text-paper/70 flex items-center justify-center hover:bg-paper hover:text-ink transition-colors">
                                    <LinkedIn />
                                </a>
                            </div>
                        </div>

                        <div className="lg:col-span-2">
                            <p className="eyebrow text-plum-300 mb-5">Links</p>
                            <ul className="space-y-3 text-[14px] text-paper/70">
                                <li><a href="#about" className="ink-link hover:text-paper">About</a></li>
                                <li><a href="#mission" className="ink-link hover:text-paper">Mission</a></li>
                                <li><a href="#research" className="ink-link hover:text-paper">Research</a></li>
                                <li><a href="#faq" className="ink-link hover:text-paper">FAQ</a></li>
                            </ul>
                            <p className="eyebrow text-plum-300 mt-8 mb-5">Tools</p>
                            <ul className="space-y-3 text-[14px] text-paper/70">
                                <li><a href="selene.html" className="ink-link hover:text-paper">SELENE</a></li>
                                <li><a href="lucia.html" className="ink-link hover:text-paper">LUCIA</a></li>
                                <li><a href="clara.html" className="ink-link hover:text-paper">CLARA</a></li>
                            </ul>
                        </div>

                        <div className="lg:col-span-5">
                            <p className="eyebrow text-plum-300 mb-5">Contact</p>
                            <ContactForm />
                        </div>
                    </div>

                    <div className="border-t border-paper/15 pt-10">
                        <p className="eyebrow text-plum-300 text-center mb-8">Supported by</p>
                        <div className="flex flex-col sm:flex-row gap-10 justify-center items-center">
                            <a href="https://elevenlabs.io/startup-grants"><img src="https://eleven-public-cdn.elevenlabs.io/payloadcms/cy7rxce8uki-IIElevenLabsGrants%201.webp" alt="ElevenLabs" className="rounded-lg" style={{width:'220px'}} /></a>
                            <a href="https://aws.amazon.com/activate/" className="rounded-lg overflow-hidden bg-paper p-2"><img src="images/awsactivate.jpeg" alt="AWS Activate" className="rounded-lg" style={{width:'200px'}} /></a>
                        </div>
                    </div>

                    <div className="border-t border-paper/15 mt-10 pt-8 flex flex-col md:flex-row justify-between items-center text-[12px] text-paper/45 tracking-wide">
                        <p>&copy; {new Date().getFullYear()} HARMONI Lab LLC. All rights reserved.</p>
                        <p className="mt-2 md:mt-0">Built with transparency and care for women's health.</p>
                    </div>
                </div>
            </footer>
        );

        // ---------- App ----------
        const App = () => (
            <div className="min-h-screen bg-paper text-ink selection:bg-plum-200 selection:text-plum-900">
                <Navigation />
                <Hero />
                <TrustBadges />
                <Mission />
                <Research />
                <Initiatives />
                <About />
                <Team />
                <FAQ />
                <Newsletter />
                <Footer />
            </div>
        );

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
