<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOM | HARMONI Lab - Scientific Evidence Engine</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://unpkg.com">

    <meta name="description" content="AXIOM is HARMONI Lab's hybrid Graph RAG knowledge infrastructure - a local-first scientific evidence engine for women's health research, powering SELENE, LUCIA, and CLARA.">
    <meta property="og:title" content="AXIOM | HARMONI Lab - Scientific Evidence Engine">
    <meta property="og:description" content="AXIOM is a local-first, privacy-first evidence engine combining vector search, knowledge graph traversal, and retraction-aware scoring over menopause research literature.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@harmonilab">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ['"Fraunces"', 'Georgia', 'serif'],
              sans:  ['"Inter"', 'system-ui', 'sans-serif'],
              mono:  ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
            },
            colors: {
              ink:   '#1a1320',
              paper: '#fbf9f6',
              cream: '#f3eee7',
              rule:  '#e6e0d6',
              plum:  { 50:'#f7f2fb',100:'#ece0f5',200:'#d6bdea',300:'#b994d8',400:'#956bbf',500:'#7344a3',600:'#5a2f87',700:'#46256a',800:'#321a4c',900:'#1f1030' },
            },
            letterSpacing: { tightest: '-0.04em' },
          }
        }
      }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,0..100&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">

    <style>
        body { font-family:'Inter',sans-serif; background:#fbf9f6; color:#1a1320; -webkit-font-smoothing:antialiased; }
        html { scroll-behavior:smooth; }
        .font-display { font-family:'Fraunces',Georgia,serif; font-optical-sizing:auto; font-variation-settings:"SOFT" 50; letter-spacing:-0.025em; }
        .eyebrow { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:#5a2f87; }
        .rule { border-color:#e6e0d6; }
        .ink-link { background-image:linear-gradient(currentColor,currentColor); background-size:0% 1px; background-repeat:no-repeat; background-position:0 100%; transition:background-size .4s ease; }
        .ink-link:hover { background-size:100% 1px; }
        .dropcap::first-letter { font-family:'Fraunces',Georgia,serif; font-weight:500; float:left; font-size:4.5rem; line-height:0.85; padding:0.35rem 0.75rem 0 0; color:#5a2f87; }
        .sec-num { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.2em; color:#956bbf; }
        .mono { font-family:'JetBrains Mono',monospace; }

        /* Architecture diagram connectors */
        .arch-line { position:relative; }
        .arch-line::after {
            content:'';
            position:absolute;
            left:50%; top:100%;
            width:1px; height:2rem;
            background: linear-gradient(to bottom, #5a2f87, transparent);
            transform: translateX(-50%);
        }

        /* Animated graph node suggestion in hero */
        @keyframes pulse-slow { 0%,100%{opacity:.4;} 50%{opacity:.9;} }
        .node-pulse { animation: pulse-slow 3s ease-in-out infinite; }
        .node-pulse-2 { animation: pulse-slow 3s ease-in-out 1s infinite; }
        .node-pulse-3 { animation: pulse-slow 3s ease-in-out 2s infinite; }

        /* Code block */
        .code-block {
            background: #1a1320;
            color: #e2e8f0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            line-height: 1.8;
            padding: 1.5rem;
            overflow-x: auto;
        }
        .code-comment { color: #64748b; }
        .code-key { color: #b994d8; }
        .code-str { color: #86efac; }
        .code-num { color: #fdba74; }

        /* Tool card hover */
        .tool-card { transition: background 0.2s, border-color 0.2s; }
        .tool-card:hover { background: #f7f2fb; border-color: #b994d8; }
    </style>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect } = React;
    const { createRoot } = ReactDOM;

    const Menu = (p)=> <svg {...p} width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="1.6"><path strokeLinecap="round" d="M4 7h16M4 12h16M4 17h16"/></svg>;
    const X    = (p)=> <svg {...p} width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="1.6"><path strokeLinecap="round" d="M6 6l12 12M18 6L6 18"/></svg>;
    const ArrowRight = (p)=> <svg {...p} width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="1.6"><path strokeLinecap="round" strokeLinejoin="round" d="M5 12h14M13 6l6 6-6 6"/></svg>;
    const Send = (p)=> <svg {...p} width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="1.6"><path strokeLinecap="round" strokeLinejoin="round" d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>;
    const Check= (p)=> <svg {...p} width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="1.8"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg>;
    const LinkedIn=(p)=><svg {...p} width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>;

    // ── Navigation ──────────────────────────────────────────────────────────
    const Navigation = () => {
        const [isOpen, setIsOpen] = useState(false);
        const [scrolled, setScrolled] = useState(false);
        useEffect(() => {
            const fn = () => setScrolled(window.scrollY > 16);
            window.addEventListener('scroll', fn);
            return () => window.removeEventListener('scroll', fn);
        }, []);
        const links = [
            { name:'Home',      href:'index.html' },
            { name:'Mission',   href:'index.html#mission' },
            { name:'Research',  href:'index.html#research' },
            { name:'AXIOM',     href:'axiom.html' },
            { name:'SELENE',    href:'selene.html' },
            { name:'LUCIA',     href:'lucia.html' },
            { name:'CLARA',     href:'clara.html' },
        ];
        return (
            <nav className={`fixed w-full z-50 transition-all duration-500 ${scrolled?'bg-paper/85 backdrop-blur-md border-b border-rule':'bg-transparent'}`}>
                <div className="max-w-[1400px] mx-auto px-6 lg:px-10">
                    <div className="flex items-center justify-between h-20">
                        <a href="index.html" className="flex items-center gap-3">
                            <img src="images/brain_logo.png" alt="HARMONI logo" className="w-10 h-10 object-contain rounded-lg"/>
                            <div className="font-display text-xl tracking-tight text-ink">HARMONI <span className="font-bold text-plum-600">Lab</span></div>
                        </a>
                        <div className="hidden lg:flex items-center gap-9">
                            {links.map(l=>(
                                <a key={l.name} href={l.href} className={`ink-link text-[13px] tracking-wide hover:text-ink ${l.name==='AXIOM'?'text-plum-600 font-medium':'text-ink/75'}`}>{l.name}</a>
                            ))}
                        </div>
                        <div className="flex items-center gap-3">
                            <a href="index.html#newsletter" className="hidden sm:inline-flex items-center gap-2 px-4 py-2.5 rounded-full bg-ink text-paper text-[12px] tracking-wider uppercase font-medium hover:bg-plum-700 transition-colors">Join Early Access</a>
                            <button onClick={()=>setIsOpen(!isOpen)} className="lg:hidden p-2 text-ink">{isOpen?<X/>:<Menu/>}</button>
                        </div>
                    </div>
                </div>
                {isOpen && (
                    <div className="lg:hidden bg-paper border-t border-rule">
                        <div className="px-6 py-6 space-y-3">
                            {links.map(l=>(
                                <a key={l.name} href={l.href} onClick={()=>setIsOpen(false)} className="block py-2 font-display text-2xl text-ink">{l.name}</a>
                            ))}
                        </div>
                    </div>
                )}
            </nav>
        );
    };

    // ── Hero ────────────────────────────────────────────────────────────────
    const Hero = () => (
        <header className="relative pt-36 lg:pt-44 pb-24 overflow-hidden">
            {/* Subtle graph illustration - pure CSS/SVG, no library */}
            <div className="absolute right-0 top-24 w-80 h-80 lg:w-[480px] lg:h-[480px] pointer-events-none opacity-[0.07]" aria-hidden="true">
                <svg viewBox="0 0 480 480" fill="none" xmlns="http://www.w3.org/2000/svg">
                    {/* Edges */}
                    <line x1="240" y1="240" x2="120" y2="140" stroke="#5a2f87" strokeWidth="1"/>
                    <line x1="240" y1="240" x2="360" y2="140" stroke="#5a2f87" strokeWidth="1"/>
                    <line x1="240" y1="240" x2="100" y2="340" stroke="#5a2f87" strokeWidth="1"/>
                    <line x1="240" y1="240" x2="380" y2="340" stroke="#5a2f87" strokeWidth="1"/>
                    <line x1="240" y1="240" x2="240" y2="80" stroke="#5a2f87" strokeWidth="1"/>
                    <line x1="120" y1="140" x2="60" y2="200" stroke="#5a2f87" strokeWidth="0.5"/>
                    <line x1="120" y1="140" x2="180" y2="60" stroke="#5a2f87" strokeWidth="0.5"/>
                    <line x1="360" y1="140" x2="420" y2="200" stroke="#5a2f87" strokeWidth="0.5"/>
                    <line x1="360" y1="140" x2="300" y2="60" stroke="#5a2f87" strokeWidth="0.5"/>
                    <line x1="100" y1="340" x2="60" y2="400" stroke="#5a2f87" strokeWidth="0.5"/>
                    <line x1="380" y1="340" x2="420" y2="400" stroke="#5a2f87" strokeWidth="0.5"/>
                    {/* Focal node */}
                    <circle cx="240" cy="240" r="14" fill="#5a2f87"/>
                    {/* Neighbor nodes */}
                    <circle cx="120" cy="140" r="8" fill="#7344a3"/>
                    <circle cx="360" cy="140" r="8" fill="#7344a3"/>
                    <circle cx="100" cy="340" r="8" fill="#7344a3"/>
                    <circle cx="380" cy="340" r="8" fill="#7344a3"/>
                    <circle cx="240" cy="80"  r="8" fill="#7344a3"/>
                    {/* Outer nodes */}
                    <circle cx="60"  cy="200" r="5" fill="#956bbf"/>
                    <circle cx="180" cy="60"  r="5" fill="#956bbf"/>
                    <circle cx="420" cy="200" r="5" fill="#956bbf"/>
                    <circle cx="300" cy="60"  r="5" fill="#956bbf"/>
                    <circle cx="60"  cy="400" r="5" fill="#956bbf"/>
                    <circle cx="420" cy="400" r="5" fill="#956bbf"/>
                </svg>
            </div>

            <div className="max-w-[1400px] mx-auto px-6 lg:px-10 relative">
                <div className="flex items-center justify-between border-b border-rule pb-4 mb-12">
                    <div className="eyebrow">Frontier Project · Knowledge Infrastructure</div>
                    <div className="eyebrow hidden md:block">A HARMONI Lab Initiative</div>
                </div>

                <div className="grid lg:grid-cols-12 gap-10 items-end">
                    <div className="lg:col-span-8">
                        <p className="sec-num mb-6">§ AXIOM · Open Beta</p>
                        <h1 className="font-display font-light text-[clamp(2.5rem,7vw,6.5rem)] leading-[0.92] tracking-tightest text-ink">
                            The evidence<br/>
                            <strong className="font-bold text-plum-600">engine</strong> behind<br/>
                            every answer.
                        </h1>
                    </div>
                    <div className="lg:col-span-4">
                        <p className="text-[17px] leading-[1.7] text-ink/70 max-w-md mb-8">
                            AXIOM is HARMONI Lab's hybrid Graph RAG infrastructure: a local-first, retraction-aware scientific evidence engine over menopause research literature. It powers SELENE, LUCIA, and CLARA.
                        </p>
                        <div className="flex flex-wrap gap-3">
                            <a href="https://github.com/HARMONI-Lab/axiom" target="_blank" rel="noopener" className="inline-flex items-center gap-2 px-5 py-3 rounded-full bg-ink text-paper text-[12px] tracking-wider uppercase hover:bg-plum-700 transition-colors">
                                View on GitHub <ArrowRight/>
                            </a>
                            <a href="#architecture" className="inline-flex items-center gap-2 px-5 py-3 rounded-full border border-ink/30 text-ink text-[12px] tracking-wider uppercase hover:bg-ink hover:text-paper transition-colors">
                                Architecture <ArrowRight/>
                            </a>
                        </div>
                    </div>
                </div>

                {/* Stats strip */}
                <div className="mt-20 grid grid-cols-2 md:grid-cols-4 border border-rule">
                    {[
                        { n:'7',      l:'MCP Tools',           sub:'exposed to AI agents' },
                        { n:'2-hop',  l:'Graph Traversal',     sub:'NetworkX MultiDiGraph' },
                        { n:'8',      l:'Relation Types',      sub:'extracted by LLM' },
                        { n:'100%',   l:'Local Inference',     sub:'no data egress' },
                    ].map((s,i)=>(
                        <div key={i} className={`p-8 ${i>0?'border-l border-rule':''}`}>
                            <p className="font-display text-4xl text-plum-600 mb-1">{s.n}</p>
                            <p className="font-medium text-[13px] text-ink mb-0.5">{s.l}</p>
                            <p className="text-[11px] text-ink/50 mono">{s.sub}</p>
                        </div>
                    ))}
                </div>
            </div>
        </header>
    );

    // ── What Is AXIOM ───────────────────────────────────────────────────────
    const WhatIs = () => (
        <section className="py-28 lg:py-32 bg-paper border-t border-rule">
            <div className="max-w-[1400px] mx-auto px-6 lg:px-10">
                <div className="grid lg:grid-cols-12 gap-16">
                    <div className="lg:col-span-4">
                        <p className="sec-num mb-3">§ 01 - What it is</p>
                        <h2 className="font-display font-light text-[clamp(2rem,4vw,3.5rem)] leading-[1.05] tracking-tightest">
                            Not a chatbot.<br/>
                            <strong className="font-bold text-plum-600">An infrastructure layer.</strong>
                        </h2>
                    </div>
                    <div className="lg:col-span-7 lg:col-start-6">
                        <p className="dropcap text-[17px] leading-[1.8] text-ink/85 mb-6">
                            Most AI health tools are wrappers around general-purpose LLMs queried with raw medical questions. AXIOM takes a different approach: it builds and maintains a domain-specific knowledge graph from primary literature, then uses that graph to ground every retrieval.
                        </p>
                        <p className="text-[17px] leading-[1.8] text-ink/75 mb-8">
                            When SELENE answers a question about perimenopause and cardiovascular risk, it is not guessing from training data. It is traversing a knowledge graph of relationships extracted from peer-reviewed studies, boosted by semantic similarity, filtered against a live retraction database, and scored by study type and recency.
                        </p>
                        <p className="text-[17px] leading-[1.8] text-ink/75">
                            That infrastructure is AXIOM. It is open-source, locally deployable, and designed to run without sending patient data anywhere.
                        </p>
                    </div>
                </div>

                {/* The three commitments */}
                <div className="mt-20 grid md:grid-cols-3 gap-px bg-rule border border-rule">
                    {[
                        { t:'Retraction-aware',  d:'Every retrieval checks a live PubMed retraction index. Retracted papers are silently dropped; expressions of concern are flagged with a halved confidence score. This runs on every query, not just at ingestion.' },
                        { t:'Graph-augmented',   d:'Beyond keyword search. AXIOM extracts entities and relationships (TREATS, INCREASES_RISK, IS_SYMPTOM_OF, etc.) into a NetworkX knowledge graph, then traverses it to find evidence connections a pure vector search would miss.' },
                        { t:'Locally sovereign', d:'All inference runs on-device via Ollama. ChromaDB persists on disk. The graph serializes to a local pickle file. Nothing touches an external API unless you explicitly enable live PubMed search.' },
                    ].map((c,i)=>(
                        <div key={i} className="bg-paper p-10">
                            <p className="sec-num mb-4">{`0${i+1}`}</p>
                            <h4 className="font-display text-2xl text-ink mb-4">{c.t}</h4>
                            <p className="text-[14px] leading-[1.75] text-ink/70">{c.d}</p>
                        </div>
                    ))}
                </div>
            </div>
        </section>
    );

    // ── Architecture ────────────────────────────────────────────────────────
    const Architecture = () => (
        <section id="architecture" className="py-28 lg:py-32 bg-ink text-paper">
            <div className="max-w-[1400px] mx-auto px-6 lg:px-10">
                <div className="border-b border-paper/15 pb-10 mb-16">
                    <p className="sec-num text-plum-300 mb-3">§ 02 - Architecture</p>
                    <h2 className="font-display font-light text-[clamp(2rem,4.5vw,4rem)] leading-[1.05] tracking-tightest">
                        Three layers,<br/><strong className="font-bold text-plum-300">one pipeline.</strong>
                    </h2>
                    <p className="text-[16px] leading-[1.7] text-paper/65 max-w-2xl mt-6">
                        AXIOM decomposes retrieval-augmented generation into three composable layers. Each can be used independently; together they deliver evidence quality that neither alone can match.
                    </p>
                </div>

                {/* Three-layer diagram */}
                <div className="grid md:grid-cols-3 gap-px bg-paper/10 border border-paper/15 mb-16">
                    {[
                        {
                            layer: '01 · Ingest',
                            title: 'PDF → Graph + Vector',
                            stack: ['PyMuPDF text extraction', 'nomic-embed-text embeddings', 'ChromaDB vector store', 'MedGemma entity extraction', 'NetworkX knowledge graph'],
                            note: 'Entity extraction runs ~500-word chunks through an Ollama-hosted model, pulling out 8 entity types and 8 relation types with confidence scores.'
                        },
                        {
                            layer: '02 · Retrieve',
                            title: 'Hybrid Ranked Retrieval',
                            stack: ['Fuzzy entity matching (cosine)', 'Vector search over-pull (5×)', 'Live retraction check (Entrez)', 'Composite scoring (study type × recency)', 'Graph boost (entity fraction)'],
                            note: 'Candidate chunks are scored by semantic similarity × study-type multiplier × recency decay, then boosted proportionally by how many matched graph entities appear in the text.'
                        },
                        {
                            layer: '03 · Serve',
                            title: 'FastAPI + MCP + Streamlit',
                            stack: ['FastAPI REST backend', 'MCP server (7 tools)', 'LLM queue (single-consumer async)', 'Per-session memory (TTL + LRU)', 'React graph explorer UI'],
                            note: 'A single-consumer async LLM queue ensures Ollama is never hit concurrently. Session memory buffers the last 6 turns per browser session with 30-minute TTL expiry.'
                        },
                    ].map((l,i)=>(
                        <div key={i} className="bg-ink p-10">
                            <p className="eyebrow text-plum-300 mb-5">{l.layer}</p>
                            <h4 className="font-display text-2xl text-paper mb-6">{l.title}</h4>
                            <ul className="space-y-2 mb-6">
                                {l.stack.map((s,j)=>(
                                    <li key={j} className="flex items-center gap-3 text-[13px] text-paper/70">
                                        <span className="w-1 h-1 rounded-full bg-plum-400 flex-shrink-0"/>
                                        <span className="mono">{s}</span>
                                    </li>
                                ))}
                            </ul>
                            <p className="text-[13px] leading-[1.7] text-paper/50 border-t border-paper/10 pt-5">{l.note}</p>
                        </div>
                    ))}
                </div>

                {/* Scoring formula */}
                <div className="border border-paper/15 p-10">
                    <p className="eyebrow text-plum-300 mb-6">Composite Scoring Formula</p>
                    <div className="grid lg:grid-cols-2 gap-10">
                        <div>
                            <div className="code-block mb-6">
                                <span className="code-comment"># mcp_server/scoring.py</span>{'\n'}
                                <span className="code-key">def</span> compute_composite_score(similarity, pub_types_str, year_str):{'\n'}
                                {'    '}study_type, study_boost = classify_study_type(pub_types_str){'\n'}
                                {'    '}rec_boost = recency_boost(year_str){'\n'}
                                {'    '}composite = similarity × study_boost × rec_boost{'\n\n'}
                                <span className="code-comment">    # Then graph boost (in retrieval_service.py):</span>{'\n'}
                                {'    '}entity_fraction = entity_hits / len(matched_entities){'\n'}
                                {'    '}boost = GRAPH_BOOST_WEIGHT × entity_fraction{'\n'}
                                {'    '}final = min(composite + boost, <span className="code-num">1.0</span>)
                            </div>
                        </div>
                        <div className="space-y-4">
                            <p className="eyebrow text-plum-300 mb-3">Study-type multipliers</p>
                            {[
                                { t:'Meta-analysis',   v:'1.30×' },
                                { t:'Systematic review', v:'1.25×' },
                                { t:'RCT',             v:'1.20×' },
                                { t:'Clinical trial',  v:'1.15×' },
                                { t:'Cohort study',    v:'1.10×' },
                                { t:'Review / editorial', v:'0.90–0.95×' },
                            ].map((r,i)=>(
                                <div key={i} className="flex items-center justify-between border-b border-paper/10 pb-3">
                                    <span className="text-[13px] text-paper/70 mono">{r.t}</span>
                                    <span className="text-[13px] text-plum-300 mono font-medium">{r.v}</span>
                                </div>
                            ))}
                            <p className="text-[12px] text-paper/40 pt-2">Recency: exponential decay e^(−0.03 × age_years)</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    );

    // ── Knowledge Graph ─────────────────────────────────────────────────────
    const KnowledgeGraph = () => (
        <section id="graph" className="py-28 lg:py-32 bg-cream border-t border-rule">
            <div className="max-w-[1400px] mx-auto px-6 lg:px-10">
                <div className="border-b border-rule pb-10 mb-16">
                    <p className="sec-num mb-3">§ 03 - Knowledge Graph</p>
                    <h2 className="font-display font-light text-[clamp(2rem,4.5vw,4rem)] leading-[1.05] tracking-tightest">
                        What the graph<br/><strong className="font-bold text-plum-600">actually knows.</strong>
                    </h2>
                    <p className="text-[16px] leading-[1.7] text-ink/70 max-w-2xl mt-6">
                        Entity extraction runs on every ingested paper chunk. The graph grows incrementally - and can be queried, visualized, and traversed independently of the vector store.
                    </p>
                </div>

                <div className="grid lg:grid-cols-2 gap-16">
                    {/* Entity types */}
                    <div>
                        <p className="eyebrow mb-6">8 Entity Types</p>
                        <div className="grid grid-cols-2 gap-px bg-rule border border-rule">
                            {[
                                { t:'Treatment',      c:'#0ea5e9', ex:'estradiol, bisphosphonates, SSRIs' },

                                { t:'Symptom',        c:'#a855f7', ex:'hot flashes, night sweats, joint pain' },

                        <div className="space-y-px border border-rule">
                            {[

                                { rel:'INCREASES_RISK',  ex:'smoking → early menopause',           conf:'≥0.85' },
                                { rel:'REDUCES_RISK',    ex:'exercise → osteoporosis',             conf:'≥0.80' },
                                { rel:'HAS_SIDE_EFFECT', ex:'tamoxifen → hot flashes',             conf:'≥0.85' },
                                { rel:'ASSOCIATED_WITH', ex:'surgical menopause → osteoporosis',   conf:'≥0.70' },

                                { rel:'CONTRAINDICATES', ex:'estrogen → active breast cancer',     conf:'≥0.90' },
                                { rel:'IS_SYMPTOM_OF',   ex:'hot flashes → menopause',             conf:'≥0.75' },
                            ].map((r,i)=>(
                                <div key={i} className="bg-paper px-5 py-4 flex items-center gap-4">
                                    <span className="mono text-[11px] text-plum-600 font-medium w-36 flex-shrink-0">{r.rel}</span>
                                    <span className="text-[12px] text-ink/65 flex-1">{r.ex}</span>
                                    <span className="mono text-[11px] text-ink/40">{r.conf}</span>
                                </div>

                        <p className="text-[12px] text-ink/50 mt-4 mono">

                </div>

                {/* Graph quality pipeline */}
                <div className="mt-16 border border-rule">
                    <div className="border-b border-rule px-10 py-6 flex items-center justify-between">
                        <p className="eyebrow">Graph Quality Pipeline (scripts/)</p>
                        <p className="text-[12px] text-ink/50 mono">Run in order after each major ingest</p>
                    </div>
                    <div className="grid md:grid-cols-4 gap-px bg-rule">
                        {[
                            { step:'1', name:'audit_graph.py',    desc:'Read-only quality report: entity type distribution, confidence histogram, degree distribution, hub analysis.' },
                            { step:'2', name:'merge_lexical.py',  desc:'Case and punctuation deduplication. "Estradiol" and "estradiol" become one node. No Ollama required.' },
                            { step:'3', name:'prune_graph.py',    desc:'Structural noise removal. Parallel edge deduplication, confidence threshold filtering, singleton pruning.' },
                            { step:'4', name:'merge_entities.py', desc:'Semantic synonym merging via embedding cosine similarity. "HRT" and "hormone replacement therapy" become one.' },
                        ].map((s,i)=>(
                            <div key={i} className="bg-paper p-8">
                                <div className="flex items-baseline gap-3 mb-4">
                                    <span className="font-display text-4xl text-plum-300">{s.step}</span>
                                </div>
                                <p className="mono text-[12px] text-plum-600 mb-3">{s.name}</p>
                                <p className="text-[13px] leading-[1.7] text-ink/70">{s.desc}</p>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        </section>
    );

    // ── MCP Tools ───────────────────────────────────────────────────────────
    const MCPTools = () => (
        <section id="mcp" className="py-28 lg:py-32 bg-paper border-t border-rule">
            <div className="max-w-[1400px] mx-auto px-6 lg:px-10">
                <div className="grid lg:grid-cols-12 gap-12 mb-16">
                    <div className="lg:col-span-5">
                        <p className="sec-num mb-3">§ 04 - MCP Interface</p>
                        <h2 className="font-display font-light text-[clamp(2rem,4.5vw,4rem)] leading-[1.05] tracking-tightest">
                            Seven tools for<br/><strong className="font-bold text-plum-600">AI agents.</strong>
                        </h2>
                    </div>
                    <div className="lg:col-span-6 lg:col-start-7 lg:pt-6">
                        <p className="text-[17px] leading-[1.7] text-ink/70">
                            AXIOM exposes its entire knowledge base and retrieval pipeline as an MCP server. Any AI agent - Claude, a custom agent, a research pipeline - can query it directly.
                        </p>
                    </div>
                </div>

                <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-px bg-rule border border-rule">
                    {[
                        {
                            name: 'search_pubmed',
                            desc: 'Search PubMed via NCBI Entrez. Queries are automatically scrubbed for PHI before transmission.',
                            tags: ['Live search', 'PHI-safe'],
                        },
                        {
                            name: 'ingest_to_chroma',
                            desc: 'Fetch PubMed results and ingest them into the local vector store and entity extraction pipeline.',
                            tags: ['Background sync', 'Graph build'],
                        },
                        {
                            name: 'query_evidence',
                            desc: 'Hybrid graph + vector retrieval with composite scoring. Returns structured JSON or markdown. The primary retrieval tool.',
                            tags: ['Hybrid RAG', 'Retraction filter'],
                        },
                        {
                            name: 'get_entity_context',
                            desc: 'N-hop neighborhood traversal for a named entity. Returns all relationships and connected entities within max_hops.',
                            tags: ['Graph traversal', 'Entity lookup'],
                        },
                        {
                            name: 'get_new_research',
                            desc: 'Poll PubMed for recent publications on monitored topics and ingest them. Updates or adds articles published in the last N days.',
                            tags: ['Scheduled sync', 'Delta ingest'],
                        },
                        {
                            name: 'check_retractions',
                            desc: 'Verify retraction status for specific PMIDs, or run a full audit of the entire knowledge base against the PubMed retraction index.',
                            tags: ['Safety', 'Full audit'],
                        },
                        {
                            name: 'list_papers',
                            desc: 'Return a summary of the current knowledge base: total chunks, graph entity count, relationship count, entity type distribution.',
                            tags: ['Introspection'],
                        },
                    ].map((t,i)=>(
                        <div key={i} className="tool-card bg-paper p-8 border border-transparent">
                            <p className="mono text-[13px] text-plum-600 font-medium mb-3">{t.name}()</p>
                            <p className="text-[14px] leading-[1.7] text-ink/70 mb-4">{t.desc}</p>
                            <div className="flex flex-wrap gap-2">
                                {t.tags.map((tag,j)=>(
                                    <span key={j} className="px-2.5 py-1 bg-plum-50 border border-plum-200 text-plum-700 text-[11px] mono rounded-full">{tag}</span>
                                ))}
                            </div>
                        </div>
                    ))}
                </div>

                {/* Transport options */}
                <div className="mt-8 border border-rule p-8 flex flex-col md:flex-row md:items-center gap-6">
                    <div className="flex-1">
                        <p className="eyebrow mb-2">Transport options</p>
                        <p className="text-[14px] text-ink/70">AXIOM's MCP server supports three transports. Set <span className="mono text-plum-600">MCP_TRANSPORT</span> in your environment.</p>
                    </div>
                    <div className="flex flex-wrap gap-3">
                        {['streamable-http (default)', 'SSE', 'stdio (agent mode)'].map((t,i)=>(
                            <span key={i} className="px-4 py-2 border border-rule mono text-[12px] text-ink/70 rounded-full">{t}</span>
                        ))}
                    </div>
                </div>
            </div>
        </section>
    );

    // ── Privacy & Stack ─────────────────────────────────────────────────────
    const Stack = () => (
        <section id="stack" className="py-28 lg:py-32 bg-ink text-paper border-t border-rule">
            <div className="max-w-[1400px] mx-auto px-6 lg:px-10">
                <div className="border-b border-paper/15 pb-10 mb-16">
                    <p className="sec-num text-plum-300 mb-3">§ 05 - Stack & Privacy</p>
                    <h2 className="font-display font-light text-[clamp(2rem,4.5vw,4rem)] leading-[1.05] tracking-tightest">
                        Everything runs<br/><strong className="font-bold text-plum-300">where you deploy it.</strong>
                    </h2>
                </div>

                <div className="grid lg:grid-cols-2 gap-16 mb-16">
                    <div>
                        <p className="eyebrow text-plum-300 mb-8">Core stack</p>
                        <div className="space-y-px border border-paper/15">
                            {[
                                { layer:'Inference',    val:'Ollama · MedGemma / gemma4',          note:'configurable via AXIOM_MODEL_NAME' },
                                { layer:'Embeddings',   val:'nomic-embed-text (768d)',              note:'via Ollama API' },
                                { layer:'Vector store', val:'ChromaDB · cosine distance',          note:'persistent to disk' },
                                { layer:'Graph store',  val:'NetworkX MultiDiGraph',               note:'serialized to graph.pkl' },
                                { layer:'API',          val:'FastAPI · async · rate-limited',       note:'optional API key in production' },
                                { layer:'MCP server',   val:'FastMCP · 7 tools',                   note:'streamable-http / SSE / stdio' },
                                { layer:'Frontend',     val:'React + Vite + react-force-graph-2d', note:'ego graph explorer' },
                                { layer:'Literature',   val:'NCBI Entrez (Biopython)',              note:'optional live PubMed search' },
                            ].map((r,i)=>(
                                <div key={i} className="bg-ink px-7 py-5 flex flex-col md:flex-row md:items-center gap-1 md:gap-6 border-b border-paper/10">
                                    <span className="mono text-[11px] text-plum-300 w-28 flex-shrink-0">{r.layer}</span>
                                    <span className="text-[13px] text-paper/85 flex-1">{r.val}</span>
                                    <span className="mono text-[11px] text-paper/35">{r.note}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div>
                        <p className="eyebrow text-plum-300 mb-8">Privacy guarantees</p>
                        <div className="space-y-6">
                            {[
                                {
                                    t: 'Zero-Leak Mandate',
                                    d: 'All queries that touch external APIs (PubMed) are first passed through a two-step PHI scrubber: regex patterns strip dates, MRNs, SSNs, and phone numbers; an LLM then generalizes any remaining clinical specifics to pathophysiological search terms.'
                                },
                                {
                                    t: 'No cloud inference',
                                    d: 'LLM calls go to localhost:11434 (Ollama). Embedding calls go to the same endpoint. No OpenAI, Anthropic, or any remote API is used at runtime.'
                                },
                                {
                                    t: 'Session isolation',
                                    d: 'Per-browser session memory is held in process RAM with 30-minute TTL and 100-session LRU cap. Nothing is written to disk. Clearing the session via API deletes it immediately.'
                                },
                                {
                                    t: 'Retraction as safety',
                                    d: 'The retraction checker treats retracted papers as a safety concern, not just a quality issue. Retracted sources are blocked from retrieval entirely, not merely downranked.'
                                },
                            ].map((p,i)=>(
                                <div key={i} className="border-l-2 border-plum-600 pl-6">
                                    <p className="font-medium text-[14px] text-paper mb-2">{p.t}</p>
                                    <p className="text-[14px] leading-[1.7] text-paper/60">{p.d}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>

                {/* Deployment */}
                <div className="border border-paper/15 p-10">
                    <p className="eyebrow text-plum-300 mb-6">Quickstart</p>
                    <div className="code-block">
                        <span className="code-comment"># Clone and configure</span>{'\n'}
                        git clone https://github.com/HARMONI-Lab/axiom.git && cd axiom{'\n'}
                        cp .env.example .env  <span className="code-comment">  # set ENTREZ_EMAIL at minimum</span>{'\n\n'}
                        <span className="code-comment"># Docker Compose (recommended)</span>{'\n'}
                        make up               <span className="code-comment">  # starts Ollama + API + Streamlit + MCP</span>{'\n'}
                        make model-pull       <span className="code-comment">  # pulls gemma4 + nomic-embed-text</span>{'\n'}
                        make ingest           <span className="code-comment">  # ingests PDFs from data/raw/</span>{'\n\n'}
                        <span className="code-comment"># Or local dev (no Docker)</span>{'\n'}
                        pip install -r requirements.txt{'\n'}
                        uvicorn app.api:app --host 127.0.0.1 --port 8000 --reload{'\n'}
                        python -m mcp_server.server
                    </div>
                </div>
            </div>
        </section>
    );

    // ── Powers ──────────────────────────────────────────────────────────────
    const Powers = () => (
        <section id="powers" className="py-28 lg:py-32 bg-cream border-t border-rule">
            <div className="max-w-[1400px] mx-auto px-6 lg:px-10">
                <div className="border-b border-rule pb-10 mb-16">
                    <p className="sec-num mb-3">§ 06 - What AXIOM powers</p>
                    <h2 className="font-display font-light text-[clamp(2rem,4.5vw,4rem)] leading-[1.05] tracking-tightest">
                        The engine behind<br/><strong className="font-bold text-plum-600">every tool.</strong>
                    </h2>
                    <p className="text-[16px] leading-[1.7] text-ink/70 max-w-2xl mt-6">
                        AXIOM is not one of the lab's products. It is the substrate the other products are built on.
                    </p>
                </div>

                <div className="grid md:grid-cols-3 gap-px bg-rule border border-rule">
                    {[
                        {
                            name: 'SELENE',
                            href: 'selene.html',
                            role: 'Consumer tool',
                            desc: 'SELENE\'s retrieval-augmented responses are grounded by AXIOM\'s hybrid search. When a woman asks about joint pain in perimenopause, SELENE\'s RAG is AXIOM querying its knowledge graph and returning confidence-ranked evidence.',
                        },
                        {
                            name: 'LUCIA',
                            href: 'lucia.html',
                            role: 'Clinical tool',
                            desc: 'LUCIA\'s Auditor agent checks the AXIOM Knowledge Base when flagging potential diagnostic oversights. The claim that a symptom cluster is consistent with an autoimmune condition, not "nerves," is backed by traversable graph evidence.',
                        },
                        {
                            name: 'CLARA',
                            href: 'clara.html',
                            role: 'Clinical tool',
                            desc: 'CLARA\'s bias detection generates evidence-based prompts. Those prompts are grounded in AXIOM\'s literature - what the research actually says about the pattern being flagged, not what a general-purpose LLM infers.',
                        },
                    ].map((p,i)=>(
                        <a key={i} href={p.href} className="block bg-paper p-10 hover:bg-plum-50 transition-colors group">
                            <div className="flex items-baseline justify-between mb-6">
                                <h3 className="font-display text-5xl text-ink group-hover:text-plum-600 transition-colors">{p.name}</h3>
                                <span className="eyebrow">{p.role}</span>
                            </div>
                            <p className="text-[15px] leading-[1.75] text-ink/70 mb-6">{p.desc}</p>
                            <span className="inline-flex items-center gap-2 text-[12px] tracking-wider uppercase text-plum-600">
                                Learn more <ArrowRight/>
                            </span>
                        </a>
                    ))}
                </div>
            </div>
        </section>
    );

    // ── Contact form & Footer ───────────────────────────────────────────────
    const ContactForm = () => {
        const [d,setD]=useState({name:'',email:'',message:''});
        const [e,setE]=useState({});
        const [s,setS]=useState('idle');
        const validate=()=>{const er={};if(!d.name.trim())er.name='Required.';if(!d.email.trim())er.email='Required.';else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(d.email))er.email='Invalid email.';if(!d.message.trim())er.message='Required.';return er;};
        const onChange=ev=>{const{name,value}=ev.target;setD(p=>({...p,[name]:value}));if(e[name])setE(p=>({...p,[name]:''}));};
        const onSubmit=async ev=>{ev.preventDefault();const er=validate();if(Object.keys(er).length){setE(er);return;}setS('sending');try{const r=await fetch('https://formspree.io/f/xgoolwyl',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});if(r.ok){setS('sent');setD({name:'',email:'',message:''});}else setS('error');}catch{setS('error');}};
        if(s==='sent')return(<div className="py-3"><Check className="mb-2 text-plum-300"/><p className="font-display text-lg text-paper">Message sent.</p><p className="text-paper/50 text-xs mt-1">We'll be in touch.</p><button onClick={()=>setS('idle')} className="mt-3 text-xs text-plum-300 underline">Send another</button></div>);
        const ib="w-full px-0 py-2 bg-transparent border-0 border-b border-paper/25 focus:outline-none focus:border-plum-300 text-sm text-paper placeholder-paper/40 transition-colors";
        return(<form onSubmit={onSubmit} className="space-y-5"><div><input name="name" type="text" value={d.name} onChange={onChange} placeholder="Your Name" className={ib}/>{e.name&&<div className="text-xs text-red-300 mt-1">{e.name}</div>}</div><div><input name="email" type="email" value={d.email} onChange={onChange} placeholder="Your Email" className={ib}/>{e.email&&<div className="text-xs text-red-300 mt-1">{e.email}</div>}</div><div><textarea name="message" rows="3" value={d.message} onChange={onChange} placeholder="Your Message" className={`${ib} resize-none`}/>{e.message&&<div className="text-xs text-red-300 mt-1">{e.message}</div>}</div><input type="text" name="_gotcha" style={{display:'none'}}/><button type="submit" disabled={s==='sending'} className="inline-flex items-center gap-2 px-5 py-3 bg-paper text-ink rounded-full text-[12px] tracking-wider uppercase hover:bg-plum-200 transition-colors disabled:opacity-50"><Send/><span>{s==='sending'?'Sending...':'Send Message'}</span></button>{s==='error'&&<p className="text-xs text-red-300">Something went wrong.</p>}</form>);
    };

    const Footer = () => (
        <footer id="contact" className="bg-ink text-paper">
            <div className="max-w-[1400px] mx-auto px-6 lg:px-10 pt-24 pb-10">
                <div className="grid lg:grid-cols-12 gap-12 mb-20">
                    <div className="lg:col-span-5">
                        <div className="flex items-center gap-3 mb-6">
                            <img src="images/brain_logo.png" alt="HARMONI logo" className="w-12 h-12 object-contain rounded-lg"/>
                            <span className="font-display text-3xl text-paper">HARMONI <span className="font-bold text-plum-300">Lab</span></span>
                        </div>
                        <p className="text-paper/65 max-w-md text-[15px] leading-relaxed">An independent AI research lab exploring the impact of hormonal changes on the female brain.</p>
                        <div className="flex gap-3 mt-8">
                            <a href="https://ga.linkedin.com/company/harmoni-lab" target="_blank" rel="noopener" className="w-10 h-10 rounded-full border border-paper/20 text-paper/70 flex items-center justify-center hover:bg-paper hover:text-ink transition-colors"><LinkedIn/></a>
                        </div>
                    </div>
                    <div className="lg:col-span-2">
                        <p className="eyebrow text-plum-300 mb-5">Links</p>
                        <ul className="space-y-3 text-[14px] text-paper/70">
                            <li><a href="index.html#about" className="ink-link hover:text-paper">About</a></li>
                            <li><a href="index.html#mission" className="ink-link hover:text-paper">Mission</a></li>
                            <li><a href="index.html#research" className="ink-link hover:text-paper">Research</a></li>
                        </ul>
                        <p className="eyebrow text-plum-300 mt-8 mb-5">Tools</p>
                        <ul className="space-y-3 text-[14px] text-paper/70">
                            <li><a href="axiom.html" className="ink-link hover:text-paper text-plum-300">AXIOM</a></li>
                            <li><a href="selene.html" className="ink-link hover:text-paper">SELENE</a></li>
                            <li><a href="lucia.html" className="ink-link hover:text-paper">LUCIA</a></li>
                            <li><a href="clara.html" className="ink-link hover:text-paper">CLARA</a></li>
                        </ul>
                    </div>
                    <div className="lg:col-span-5">
                        <p className="eyebrow text-plum-300 mb-5">Contact</p>
                        <ContactForm/>
                    </div>
                </div>
                <div className="border-t border-paper/15 mt-10 pt-8 flex flex-col md:flex-row justify-between items-center text-[12px] text-paper/45 tracking-wide">
                    <p>&copy; {new Date().getFullYear()} HARMONI Lab LLC. All rights reserved.</p>
                    <p className="mt-2 md:mt-0">Built with transparency and care for women's health.</p>
                </div>
            </div>
        </footer>
    );

    // ── App ─────────────────────────────────────────────────────────────────
    const App = () => (
        <div className="min-h-screen bg-paper text-ink selection:bg-plum-200 selection:text-plum-900">
            <Navigation/>
            <Hero/>
            <WhatIs/>
            <Architecture/>
            <KnowledgeGraph/>
            <MCPTools/>
            <Stack/>
            <Powers/>
            <Footer/>
        </div>
    );

    createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
