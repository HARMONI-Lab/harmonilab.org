<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOM · Evidence Infrastructure for Clinical AI · HARMONI Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta name="description" content="AXIOM is a retraction-aware evidence engine that grounds clinical AI systems in current, citable research, built by HARMONI Lab for teams deploying AI in regulated and clinically sensitive settings.">
    <meta property="og:title" content="AXIOM · Evidence Infrastructure for Clinical AI">
    <meta property="og:description" content="Retraction-aware evidence grounding for clinical AI. Built by HARMONI Lab.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: { extend: {
          fontFamily: { serif:['"Fraunces"','Georgia','serif'], sans:['"Inter"','system-ui','sans-serif'], mono:['"JetBrains Mono"','ui-monospace','monospace'] },
          colors: {
            ink:'#1a1320', paper:'#fbf9f6', cream:'#f3eee7', rule:'#e6e0d6',
            plum:{ 50:'#f7f2fb',100:'#ece0f5',200:'#d6bdea',300:'#b994d8',400:'#956bbf',500:'#7344a3',600:'#5a2f87',700:'#46256a',800:'#321a4c',900:'#1f1030' },
            steel:{ 50:'#f4f6f8',100:'#e5eaef',200:'#c7d1db',300:'#9daebe',400:'#6e879e',500:'#4f6a82',600:'#3c526a',700:'#2b3d52',800:'#1e2c3d',900:'#141f2c' },
          },
          letterSpacing: { tightest:'-0.04em' },
        }}
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,0..100&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <style>
        body{font-family:'Inter',sans-serif;background:#f4f6f8;color:#1e2c3d;-webkit-font-smoothing:antialiased;}
        html{scroll-behavior:smooth;}
        .font-display{font-family:'Fraunces',Georgia,serif;font-optical-sizing:auto;font-variation-settings:"SOFT" 30;letter-spacing:-0.02em;}
        .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:#4f6a82;}
        .rule{border-color:#c7d1db;}
        .ink-link{background-image:linear-gradient(currentColor,currentColor);background-size:0% 1px;background-repeat:no-repeat;background-position:0 100%;transition:background-size .4s ease;}
        .ink-link:hover{background-size:100% 1px;}
        .sec-num{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.2em;color:#6e879e;}
        .mono{font-family:'JetBrains Mono',monospace;}
        /* Redacted-schematic signature: blocked-out internals motif */
        .redact{background:repeating-linear-gradient(135deg,#2b3d52 0,#2b3d52 6px,#1e2c3d 6px,#1e2c3d 12px);}
        .node{fill:#4f6a82;}
        .node-line{stroke:#4f6a82;stroke-width:1;opacity:0.35;}
    </style>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
    const { useState, useEffect } = React;
    const { createRoot } = ReactDOM;

    const Menu=(p)=><svg {...p} width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="1.6"><path strokeLinecap="round" d="M4 7h16M4 12h16M4 17h16"/></svg>;
    const X=(p)=><svg {...p} width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="1.6"><path strokeLinecap="round" d="M6 6l12 12M18 6L6 18"/></svg>;
    const ArrowRight=(p)=><svg {...p} width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="1.6"><path strokeLinecap="round" strokeLinejoin="round" d="M5 12h14M13 6l6 6-6 6"/></svg>;
    const Check=(p)=><svg {...p} width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="1.8"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg>;
    const Send=(p)=><svg {...p} width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="1.6"><path strokeLinecap="round" strokeLinejoin="round" d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>;
    const Lock=(p)=><svg {...p} width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="1.8"><rect x="5" y="11" width="14" height="10" rx="2"/><path strokeLinecap="round" d="M8 11V7a4 4 0 018 0v4"/></svg>;
    const Shield=(p)=><svg {...p} width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="1.6"><path strokeLinecap="round" strokeLinejoin="round" d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-4z"/></svg>;

    const Navigation = () => {
        const [isOpen, setIsOpen] = useState(false);
        const [scrolled, setScrolled] = useState(false);
        useEffect(()=>{ const fn=()=>setScrolled(window.scrollY>16); window.addEventListener('scroll',fn); return ()=>window.removeEventListener('scroll',fn); },[]);
        const links = [
            {name:'Home',href:'index.html'},
            {name:'Research',href:'index.html#research'},
            {name:'SELENE',href:'selene.html'},
        ];
        return (
            <nav className={`fixed w-full z-50 transition-all duration-500 ${scrolled?'bg-[#f4f6f8]/90 backdrop-blur-md border-b border-steel-200':'bg-transparent'}`}>
                <div className="max-w-[1400px] mx-auto px-6 lg:px-10">
                    <div className="flex items-center justify-between h-20">
                        <a href="index.html" className="flex items-center gap-3">
                            <div className="w-9 h-9 rounded-sm redact"/>
                            <div className="font-display text-xl tracking-tight text-steel-900">AXIOM</div>
                        </a>
                        <div className="hidden lg:flex items-center gap-9">
                            {links.map(l=><a key={l.name} href={l.href} className="ink-link text-[13px] tracking-wide text-steel-700 hover:text-steel-900">{l.name}</a>)}
                        </div>
                        <div className="flex items-center gap-3">
                            <a href="#contact" className="hidden sm:inline-flex items-center gap-2 px-4 py-2.5 rounded-sm bg-steel-800 text-paper text-[12px] tracking-wider uppercase font-medium hover:bg-steel-900 transition-colors">Talk to Us</a>
                            <button onClick={()=>setIsOpen(!isOpen)} className="lg:hidden p-2 text-steel-800">{isOpen?<X/>:<Menu/>}</button>
                        </div>
                    </div>
                </div>
                {isOpen&&<div className="lg:hidden bg-[#f4f6f8] border-t border-steel-200"><div className="px-6 py-6 space-y-3">{links.map(l=><a key={l.name} href={l.href} onClick={()=>setIsOpen(false)} className="block py-2 font-display text-2xl text-steel-900">{l.name}</a>)}</div></div>}
            </nav>
        );
    };

    const Hero = () => (
        <header className="relative pt-36 lg:pt-44 pb-20 lg:pb-28 overflow-hidden">
            <div className="max-w-[1400px] mx-auto px-6 lg:px-10 relative">
                <div className="flex items-center justify-between border-b border-steel-200 pb-4 mb-12">
                    <p className="eyebrow">Built by HARMONI Lab · Proprietary</p>
                    <span className="inline-flex items-center gap-1.5 mono text-[10px] tracking-widest uppercase text-steel-500 border border-steel-300 px-2.5 py-1 rounded-sm"><Lock/> Available to partners</span>
                </div>
                <div className="grid lg:grid-cols-12 gap-10 items-end">
                    <div className="lg:col-span-8">
                        <h1 className="font-display font-light text-[clamp(2.5rem,6.5vw,6rem)] leading-[1] tracking-tightest text-steel-900">
                            Clinical AI is only as trustworthy<br/>
                            as the <span className="font-bold text-steel-700">evidence beneath it.</span>
                        </h1>
                    </div>
                    <div className="lg:col-span-4">
                        <p className="text-[17px] leading-relaxed text-steel-700/90 mb-8">
                            AXIOM grounds AI systems in current, citable research, and refuses to answer from evidence that's been retracted. Built for teams who can't afford to find out the hard way.
                        </p>
                        <div className="flex flex-wrap gap-3">
                            <a href="#contact" className="inline-flex items-center gap-2 px-5 py-3 rounded-sm bg-steel-800 text-paper text-[13px] tracking-wide hover:bg-steel-900 transition-colors">Talk to Us <ArrowRight/></a>
                            <a href="#how" className="inline-flex items-center gap-2 px-5 py-3 rounded-sm border border-steel-300 text-steel-800 text-[13px] tracking-wide hover:bg-steel-800 hover:text-paper transition-colors">How it Works</a>
                        </div>
                    </div>
                </div>
            </div>
        </header>
    );

    const Problem = () => (
        <section className="py-24 lg:py-32 border-t border-steel-200 bg-white/40">
            <div className="max-w-[1400px] mx-auto px-6 lg:px-10">
                <div className="grid lg:grid-cols-12 gap-12 lg:gap-20 items-start">
                    <div className="lg:col-span-5">
                        <span className="eyebrow">The Problem</span>
                        <h2 className="font-display font-light text-[clamp(2rem,4.5vw,3.5rem)] leading-[1.05] tracking-tightest text-steel-900 mt-6 mb-6">
                            LLMs cite studies.<br/><span className="font-bold text-steel-700">They don't check if those studies still stand.</span>
                        </h2>
                        <p className="text-[16px] leading-[1.75] text-steel-700/90">
                            A retracted paper doesn't disappear from a model's training data or a RAG index. It sits there, indistinguishable from valid evidence, ready to be cited with total confidence in a compliance answer, a clinical summary, or a diligence memo. For teams operating under regulatory or clinical scrutiny, that's not a hypothetical risk. It's a matter of when.
                        </p>
                    </div>
                    <div className="lg:col-span-7">
                        <div className="grid sm:grid-cols-3 gap-4">
                            {[
                                {t:'Silent citation risk',d:'Outdated or retracted sources get cited with the same confidence as valid ones, with no built-in way to tell the difference.'},
                                {t:'Compliance exposure',d:'Every unverified citation is a liability surface in regulated industries, including audits, malpractice review, and FDA submissions.'},
                                {t:'No standard fix',d:'Most RAG pipelines were built for speed and relevance, not evidentiary integrity. Retraction-checking is not a default feature anywhere.'},
                            ].map((c,i)=>(
                                <div key={i} className="border border-steel-200 bg-white p-6 rounded-sm">
                                    <p className="font-display text-lg text-steel-900 mb-2">{c.t}</p>
                                    <p className="text-[13px] leading-[1.6] text-steel-600">{c.d}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            </div>
        </section>
    );

    const How = () => (
        <section id="how" className="py-24 lg:py-32 bg-steel-900 text-paper relative overflow-hidden">
            <div className="max-w-[1400px] mx-auto px-6 lg:px-10 relative">
                <span className="eyebrow text-steel-300">How It Works</span>
                <h2 className="font-display font-light text-[clamp(2rem,4.5vw,3.5rem)] leading-[1.05] tracking-tightest mt-6 mb-14 max-w-3xl">
                    A fail-closed gate between your AI and the evidence it relies on.
                </h2>
                <div className="grid md:grid-cols-3 gap-6">
                    {[
                        {n:'01',t:'Grounds every answer in current literature',d:'Your AI system\'s outputs are checked against a maintained evidence base, not just whatever was in its training data.'},
                        {n:'02',t:'Fails closed on retracted evidence',d:'If a source has been retracted or subject to a formal expression of concern, AXIOM blocks the citation rather than silently downgrading confidence.'},
                        {n:'03',t:'Sits behind your existing stack',d:'Deploys as infrastructure your AI systems query, requiring no need to rebuild your pipeline or retrain your models to adopt it.'},
                    ].map((s,i)=>(
                        <div key={i} className="border border-steel-700 p-8 rounded-sm">
                            <span className="mono text-[11px] text-steel-400 tracking-widest">{s.n}</span>
                            <p className="font-display text-2xl text-paper mt-4 mb-3">{s.t}</p>
                            <p className="text-[14px] leading-[1.7] text-steel-300">{s.d}</p>
                        </div>
                    ))}
                </div>

                {/* Signature element: redacted schematic — visible flow, opaque internals */}
                <div className="mt-16 border border-steel-700 rounded-sm p-8 lg:p-12 bg-steel-800/40">
                    <p className="eyebrow text-steel-400 mb-8">System Overview · Architecture Available Under NDA</p>
                    <svg viewBox="0 0 900 200" className="w-full h-auto">
                        <rect x="10" y="80" width="150" height="48" rx="4" fill="none" stroke="#6e879e" strokeWidth="1.5"/>
                        <text x="85" y="108" textAnchor="middle" fill="#c7d1db" fontSize="13" fontFamily="JetBrains Mono, monospace">Your AI System</text>

                        <line x1="160" y1="104" x2="230" y2="104" className="node-line" stroke="#6e879e" strokeWidth="1.5" opacity="0.6"/>

                        <rect x="230" y="40" width="440" height="130" rx="6" className="redact"/>
                        <text x="450" y="112" textAnchor="middle" fill="#e5eaef" fontSize="15" fontFamily="Fraunces, serif" fontWeight="600">AXIOM</text>
                        <text x="450" y="132" textAnchor="middle" fill="#9daebe" fontSize="10" fontFamily="JetBrains Mono, monospace" letterSpacing="1">EVIDENCE GROUNDING · RETRACTION GATE</text>

                        <line x1="670" y1="104" x2="740" y2="104" stroke="#6e879e" strokeWidth="1.5" opacity="0.6"/>

                        <rect x="740" y="80" width="150" height="48" rx="4" fill="none" stroke="#6e879e" strokeWidth="1.5"/>
                        <text x="815" y="108" textAnchor="middle" fill="#c7d1db" fontSize="13" fontFamily="JetBrains Mono, monospace">Grounded Answer</text>
                    </svg>
                    <p className="text-[13px] text-steel-400 mt-8 max-w-2xl">
                        Full architecture, evaluation results, and integration details are shared directly with partners as part of a technical review.
                    </p>
                </div>
            </div>
        </section>
    );

    const WhoFor = () => (
        <section className="py-24 lg:py-32">
            <div className="max-w-[1400px] mx-auto px-6 lg:px-10">
                <div className="grid lg:grid-cols-12 gap-12 items-start">
                    <div className="lg:col-span-5">
                        <span className="eyebrow">Who It's For</span>
                        <h2 className="font-display font-light text-[clamp(2rem,4.5vw,3.5rem)] leading-[1.05] tracking-tightest text-steel-900 mt-6">
                            Teams whose AI output <span className="font-bold text-steel-700">has to hold up under review.</span>
                        </h2>
                    </div>
                    <div className="lg:col-span-7 grid sm:grid-cols-2 gap-6">
                        {[
                            {t:'Digital health & clinical AI vendors',d:'Products that generate clinical summaries, patient-facing content, or decision support and need every citation to be defensible.'},
                            {t:'Compliance & regulatory teams',d:'Groups preparing FDA submissions or audit responses who need to know their AI system isn\'t quietly citing withdrawn research.'},
                            {t:'Health systems piloting AI tools',d:'Organizations evaluating AI vendors who want evidentiary integrity as a procurement requirement, not an afterthought.'},
                            {t:'Research-adjacent products',d:'Any product surfacing scientific literature to end users, where a single bad citation is a trust and liability problem.'},
                        ].map((c,i)=>(
                            <div key={i} className="border-t border-steel-200 pt-6">
                                <p className="font-display text-xl text-steel-900 mb-2">{c.t}</p>
                                <p className="text-[14px] leading-[1.7] text-steel-600">{c.d}</p>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        </section>
    );

    const Origin = () => (
        <section className="py-20 lg:py-28 border-t border-steel-200 bg-white/40">
            <div className="max-w-3xl mx-auto px-6 lg:px-10 text-center">
                <Shield className="mx-auto mb-6 text-steel-500"/>
                <p className="text-[16px] leading-[1.8] text-steel-700">
                    AXIOM is built by HARMONI Lab, an independent research lab that publishes open benchmarks on clinical AI bias. That research discipline, measuring where AI systems get medical evidence wrong, is what shaped AXIOM's approach to evidence integrity.
                </p>
                <a href="index.html#research" className="inline-flex items-center gap-2 mt-6 text-[13px] tracking-wide text-steel-700 hover:text-steel-900 ink-link">See our published research <ArrowRight/></a>
            </div>
        </section>
    );

    const ContactForm = () => {
        const [d,setD]=useState({name:'',email:'',message:''});
        const [e,setE]=useState({});
        const [s,setS]=useState('idle');
        const validate=()=>{const er={};if(!d.name.trim())er.name='Required.';if(!d.email.trim())er.email='Required.';else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(d.email))er.email='Invalid.';if(!d.message.trim())er.message='Required.';return er;};
        const onChange=ev=>{const{name,value}=ev.target;setD(p=>({...p,[name]:value}));if(e[name])setE(p=>({...p,[name]:''}));};
        const onSubmit=async ev=>{ev.preventDefault();const er=validate();if(Object.keys(er).length){setE(er);return;}setS('sending');try{const r=await fetch('https://formspree.io/f/xgoolwyl',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...d,source:'AXIOM page'})});if(r.ok){setS('sent');setD({name:'',email:'',message:''});}else setS('error');}catch{setS('error');}};
        if(s==='sent')return(<div className="py-3"><Check className="mb-2 text-steel-300"/><p className="font-display text-lg text-paper">Message sent. We'll follow up shortly.</p></div>);
        const ib="w-full px-0 py-2 bg-transparent border-0 border-b border-paper/25 focus:outline-none focus:border-steel-300 text-sm text-paper placeholder-paper/40 transition-colors";
        return(<form onSubmit={onSubmit} className="space-y-5"><div><input name="name" type="text" value={d.name} onChange={onChange} placeholder="Your Name" className={ib}/>{e.name&&<div className="text-xs text-red-300 mt-1">{e.name}</div>}</div><div><input name="email" type="email" value={d.email} onChange={onChange} placeholder="Work Email" className={ib}/>{e.email&&<div className="text-xs text-red-300 mt-1">{e.email}</div>}</div><div><textarea name="message" rows="3" value={d.message} onChange={onChange} placeholder="Tell us about your use case" className={`${ib} resize-none`}/>{e.message&&<div className="text-xs text-red-300 mt-1">{e.message}</div>}</div><input type="text" name="_gotcha" style={{display:'none'}}/><button type="submit" disabled={s==='sending'} className="inline-flex items-center gap-2 px-5 py-3 bg-paper text-steel-900 rounded-sm text-[12px] tracking-wider uppercase hover:bg-steel-200 transition-colors disabled:opacity-50"><Send/><span>{s==='sending'?'Sending...':'Talk to Us'}</span></button>{s==='error'&&<p className="text-xs text-red-300">Something went wrong.</p>}</form>);
    };

    const Contact = () => (
        <section id="contact" className="py-24 lg:py-32 bg-steel-900 text-paper">
            <div className="max-w-[1400px] mx-auto px-6 lg:px-10">
                <div className="grid lg:grid-cols-12 gap-12">
                    <div className="lg:col-span-6">
                        <span className="eyebrow text-steel-300">Partner Inquiry</span>
                        <h2 className="font-display font-light text-[clamp(2rem,4.5vw,3.5rem)] leading-[1.05] tracking-tightest mt-6 mb-6">
                            Deploying AI where citations matter?
                        </h2>
                        <p className="text-[16px] leading-[1.75] text-steel-300 max-w-lg">
                            Tell us about your product and what evidence it relies on. We'll follow up to see if AXIOM is a fit and walk through the technical details directly.
                        </p>
                    </div>
                    <div className="lg:col-span-6">
                        <ContactForm/>
                    </div>
                </div>
            </div>
        </section>
    );

    const Footer = () => (
        <footer className="bg-steel-900 text-paper border-t border-steel-700">
            <div className="max-w-[1400px] mx-auto px-6 lg:px-10 py-10 flex flex-col md:flex-row justify-between items-center gap-4">
                <p className="text-[12px] text-steel-400 tracking-wide">&copy; {new Date().getFullYear()} HARMONI Lab LLC. AXIOM is proprietary software.</p>
                <a href="index.html" className="text-[12px] text-steel-400 hover:text-paper ink-link">Back to HARMONI Lab</a>
            </div>
        </footer>
    );

    const App = () => (
        <div className="min-h-screen bg-[#f4f6f8] text-steel-900 selection:bg-steel-200 selection:text-steel-900">
            <Navigation/><Hero/><Problem/><How/><WhoFor/><Origin/><Contact/><Footer/>
        </div>
    );
    createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
